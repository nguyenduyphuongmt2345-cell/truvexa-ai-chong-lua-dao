function loadQuizBestScore() {
  try {
    const raw = localStorage.getItem("truvexa_quiz_best");
    return raw ? Number(raw) : 0;
  } catch (e) {
    return 0;
  }
}

function saveQuizBestScore(score) {
  try {
    const best = loadQuizBestScore();
    if (score > best) localStorage.setItem("truvexa_quiz_best", String(score));
  } catch (e) {
    // Bỏ qua nếu localStorage bị chặn
  }
}

function QuizScreen({ onExit }) {
  const [step, setStep] = useState("intro"); // intro | playing | done
  const [order, setOrder] = useState([]);
  const [index, setIndex] = useState(0);
  const [selected, setSelected] = useState(null);
  const [score, setScore] = useState(0);
  const [wrongList, setWrongList] = useState([]);
  const bestScore = loadQuizBestScore();

  const start = () => {
    const shuffled = QUIZ_SCENARIOS.map((_, i) => i).sort(() => Math.random() - 0.5);
    setOrder(shuffled);
    setIndex(0);
    setSelected(null);
    setScore(0);
    setWrongList([]);
    setStep("playing");
  };

  const current = order.length ? QUIZ_SCENARIOS[order[index]] : null;

  const choose = (optIndex) => {
    if (selected !== null) return;
    setSelected(optIndex);
    if (optIndex === current.correct) {
      setScore((s) => s + 1);
    } else {
      setWrongList((w) => [...w, { scenario: current.scenario, chosen: current.options[optIndex], correct: current.options[current.correct], explain: current.explain }]);
    }
  };

  const next = () => {
    if (index + 1 >= order.length) {
      saveQuizBestScore(score);
      setStep("done");
      return;
    }
    setIndex((i) => i + 1);
    setSelected(null);
  };

  if (step === "intro") {
    return (
      <div style={{ padding: "18px 16px 8px" }}>
        <div style={{ background: "linear-gradient(120deg, #E8590C, #B9410C)", borderRadius: 16, padding: "22px 18px", marginBottom: 16, textAlign: "center" }}>
          <div style={{ width: 56, height: 56, borderRadius: "50%", background: "rgba(255,255,255,0.15)", display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 12px" }}>
            <FileWarning size={26} color="#fff" />
          </div>
          <div style={{ fontFamily: "'Be Vietnam Pro', sans-serif", fontWeight: 800, fontSize: 16, color: "#fff", marginBottom: 6 }}>
            Câu Đố Tình Huống Lừa Đảo
          </div>
          <div style={{ fontFamily: "'Be Vietnam Pro', sans-serif", fontSize: 12.5, color: "rgba(255,255,255,0.9)", lineHeight: 1.6 }}>
            {QUIZ_SCENARIOS.length} tình huống giả định thường gặp — chọn cách xử lý đúng để rèn phản xạ nhận diện lừa đảo ngoài đời thật.
          </div>
        </div>

        {bestScore > 0 && (
          <div style={{ display: "flex", alignItems: "center", gap: 8, background: "#fff", borderRadius: 12, padding: "12px 14px", marginBottom: 16 }}>
            <Award size={16} color="#E8590C" />
            <span style={{ fontFamily: "'Be Vietnam Pro', sans-serif", fontSize: 12.5, color: C.navyDeep }}>
              Điểm cao nhất của bạn: <b>{bestScore}/{QUIZ_SCENARIOS.length}</b>
            </span>
          </div>
        )}

        <button
          onClick={start}
          style={{ width: "100%", background: "#E8590C", color: "#fff", border: "none", borderRadius: 10, padding: "13px 0", fontFamily: "'Be Vietnam Pro', sans-serif", fontWeight: 700, fontSize: 14, cursor: "pointer" }}
        >
          Bắt Đầu Làm Câu Đố
        </button>
        <button onClick={onExit} style={{ width: "100%", marginTop: 10, background: "none", border: "none", color: C.textMuted, fontFamily: "'Be Vietnam Pro', sans-serif", fontWeight: 600, fontSize: 13, cursor: "pointer" }}>
          Quay Lại
        </button>
      </div>
    );
  }

  if (step === "playing" && current) {
    return (
      <div style={{ padding: "16px 16px 8px" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
          <span style={{ fontFamily: "'Be Vietnam Pro', sans-serif", fontWeight: 700, fontSize: 12, color: C.textMuted }}>
            Câu {index + 1}/{order.length}
          </span>
          <span style={{ fontFamily: "'Be Vietnam Pro', sans-serif", fontWeight: 700, fontSize: 12, color: "#E8590C" }}>
            Điểm: {score}
          </span>
        </div>
        <div style={{ height: 4, background: "#E3E7F3", borderRadius: 4, marginBottom: 16, overflow: "hidden" }}>
          <div style={{ height: "100%", width: `${((index + (selected !== null ? 1 : 0)) / order.length) * 100}%`, background: "#E8590C", transition: "width 0.3s" }} />
        </div>

        <div style={{ background: "#fff", borderRadius: 14, padding: "16px 15px", marginBottom: 14 }}>
          <div style={{ fontFamily: "'Be Vietnam Pro', sans-serif", fontSize: 13.5, color: C.navyDeep, lineHeight: 1.6 }}>
            {current.scenario}
          </div>
        </div>

        <div style={{ display: "flex", flexDirection: "column", gap: 10, marginBottom: 14 }}>
          {current.options.map((opt, i) => {
            const isCorrect = i === current.correct;
            const isChosen = i === selected;
            let bg = "#fff", border = "1.5px solid #E3E7F3", fg = C.navyDeep;
            if (selected !== null) {
              if (isCorrect) {
                bg = C.safeBg; border = `1.5px solid ${C.safe}`; fg = C.safe;
              } else if (isChosen) {
                bg = C.dangerBg; border = `1.5px solid ${C.danger}`; fg = C.danger;
              }
            }
            return (
              <button
                key={i}
                onClick={() => choose(i)}
                disabled={selected !== null}
                style={{ textAlign: "left", background: bg, border, borderRadius: 10, padding: "12px 14px", fontFamily: "'Be Vietnam Pro', sans-serif", fontWeight: 600, fontSize: 13, color: fg, cursor: selected !== null ? "default" : "pointer", display: "flex", alignItems: "flex-start", gap: 8 }}
              >
                {selected !== null && isCorrect && <CheckCircle2 size={16} style={{ flexShrink: 0, marginTop: 1 }} />}
                {selected !== null && isChosen && !isCorrect && <XCircle size={16} style={{ flexShrink: 0, marginTop: 1 }} />}
                <span>{opt}</span>
              </button>
            );
          })}
        </div>

        {selected !== null && (
          <div style={{ background: "#FFF4E1", borderRadius: 14, padding: "13px 15px", marginBottom: 16, display: "flex", gap: 8 }}>
            <AlertTriangle size={15} color="#B9760A" style={{ flexShrink: 0, marginTop: 1 }} />
            <div style={{ fontFamily: "'Be Vietnam Pro', sans-serif", fontSize: 12.5, color: "#7A5410", lineHeight: 1.6 }}>
              <b>{selected === current.correct ? "Chính xác! " : "Chưa đúng. "}</b>{current.explain}
            </div>
          </div>
        )}

        {selected !== null && (
          <button
            onClick={next}
            style={{ width: "100%", background: "#E8590C", color: "#fff", border: "none", borderRadius: 10, padding: "13px 0", fontFamily: "'Be Vietnam Pro', sans-serif", fontWeight: 700, fontSize: 14, cursor: "pointer" }}
          >
            {index + 1 >= order.length ? "Xem Kết Quả" : "Câu Tiếp Theo"}
          </button>
        )}
      </div>
    );
  }

  // step === "done"
  const pct = Math.round((score / order.length) * 100);
  const tier = pct >= 80 ? { label: "XUẤT SẮC", color: C.safe } : pct >= 50 ? { label: "KHÁ TỐT", color: "#B9760A" } : { label: "CẦN LUYỆN THÊM", color: C.danger };
  return (
    <div style={{ padding: "18px 16px 8px" }}>
      <div style={{ background: "#fff", borderRadius: 16, padding: "22px 18px", marginBottom: 16, textAlign: "center" }}>
        <Award size={34} color={tier.color} style={{ marginBottom: 8 }} />
        <div style={{ fontFamily: "'Be Vietnam Pro', sans-serif", fontWeight: 800, fontSize: 22, color: C.navyDeep }}>
          {score}/{order.length}
        </div>
        <div style={{ fontFamily: "'Be Vietnam Pro', sans-serif", fontWeight: 700, fontSize: 13, color: tier.color, marginTop: 4, letterSpacing: 0.5 }}>
          {tier.label}
        </div>
        {score > bestScore && (
          <div style={{ fontFamily: "'Be Vietnam Pro', sans-serif", fontSize: 11.5, color: "#E8590C", marginTop: 8 }}>
            🎉 Kỷ lục mới!
          </div>
        )}
      </div>

      {wrongList.length > 0 && (
        <div style={{ marginBottom: 16 }}>
          <div style={{ fontFamily: "'Be Vietnam Pro', sans-serif", fontWeight: 700, fontSize: 13, color: C.navyDeep, marginBottom: 10 }}>
            Xem Lại Câu Sai ({wrongList.length})
          </div>
          {wrongList.map((w, i) => (
            <div key={i} style={{ background: "#fff", borderRadius: 12, padding: "12px 14px", marginBottom: 8 }}>
              <div style={{ fontFamily: "'Be Vietnam Pro', sans-serif", fontSize: 12, color: C.textMuted, marginBottom: 6, lineHeight: 1.5 }}>{w.scenario}</div>
              <div style={{ fontFamily: "'Be Vietnam Pro', sans-serif", fontSize: 12, color: C.danger, marginBottom: 3 }}>Bạn chọn: {w.chosen}</div>
              <div style={{ fontFamily: "'Be Vietnam Pro', sans-serif", fontSize: 12, color: C.safe }}>Đúng: {w.correct}</div>
            </div>
          ))}
        </div>
      )}

      <button onClick={start} style={{ width: "100%", background: "#E8590C", color: "#fff", border: "none", borderRadius: 10, padding: "13px 0", fontFamily: "'Be Vietnam Pro', sans-serif", fontWeight: 700, fontSize: 14, cursor: "pointer", marginBottom: 10 }}>
        Làm Lại
      </button>
      <button onClick={onExit} style={{ width: "100%", background: "#2E5BFF", color: "#fff", border: "none", borderRadius: 10, padding: "13px 0", fontFamily: "'Be Vietnam Pro', sans-serif", fontWeight: 700, fontSize: 14, cursor: "pointer" }}>
        Xong
      </button>
    </div>
  );
}

  useEffect(() => {

      // Xử lý kết quả nếu trình duyệt vừa quay lại từ redirect đăng nhập

      FB.getRedirectResult(FB.auth).catch((e) => console.error("Lỗi redirect đăng nhập:", e));

      unsub = FB.onAuthStateChanged(FB.auth, async (fbUser) => {

        }
        setCheckingAuth(false);

    return () => unsub();
  }, []);

  // Tự động lưu lịch sử + khách hàng lên Firestore mỗi khi thay đổi (chỉ
  // khi đã đăng nhập thật, không phải khách) — có debounce nhẹ để tránh
  // ghi quá nhiều lần liên tiếp.
  useEffect(() => {
    if (!user || user.guest || !dataSynced) return;
    const t = setTimeout(() => {
      saveUserData(user.uid, { history, customers });
    }, 1200);
    return () => clearTimeout(t);
  }, [history, customers, user, dataSynced]);

  const handleSignIn = async (skipAsGuest) => {
    if (skipAsGuest === true) {
      setUser({ name: "Khách", email: null, guest: true });
      return;
    }
    const ok = await firebaseInitPromise;
    if (!ok) {
      alert("Chưa kết nối được máy chủ đăng nhập. Vui lòng thử lại sau hoặc dùng chế độ Khách.");
      return;
    }
    setSigningIn(true);
    try {
      const provider = new FB.GoogleAuthProvider();
      // Popup trước (mượt hơn trên máy tính); nếu bị chặn (phổ biến trên
      // trình duyệt điện thoại) thì tự động chuyển sang redirect.
      await FB.signInWithPopup(FB.auth, provider);
    } catch (e) {
      try {
        await FB.signInWithRedirect(FB.auth, new FB.GoogleAuthProvider());
      } catch (e2) {
        console.error("Đăng nhập Google thất bại:", e2);
        alert("Đăng nhập thất bại: " + (e2.message || "Vui lòng thử lại."));
      }
    }
    setSigningIn(false);
  };

  const handleSignOut = async () => {
    const ok = await firebaseInitPromise;
    if (ok && FB.auth.currentUser) {
      try {
        await FB.signOut(FB.auth);
      } catch (e) {
        console.error("Lỗi đăng xuất:", e);
      }
    }
    setUser(null);
    setDataSynced(false);
    setScreen("home");
  };

  if (checkingAuth) {
    return <AuthCheckingSplash />;
  }

  if (!user) {
    return (
      <div style={{ minHeight: "100vh", background: C.paper, display: "flex", alignItems: "center", justifyContent: "center", padding: "40px 16px", fontFamily: "'Be Vietnam Pro', sans-serif" }}>
        <div style={{ width: 340, borderRadius: 36, overflow: "hidden", background: C.navyDeep, boxShadow: "0 30px 70px -20px rgba(10,20,60,0.5)", border: "7px solid #0A1530" }}>
          <StatusBar />
          <AuthScreen onSignIn={handleSignIn} signingIn={signingIn} />
        </div>
      </div>
    );
  }

  return (
    <div style={{ minHeight: "100vh", background: C.paper, display: "flex", alignItems: "center", justifyContent: "center", padding: "40px 16px", fontFamily: "'Be Vietnam Pro', sans-serif" }}>
      <div
        style={{
          width: 340,
          borderRadius: 36,
          overflow: "hidden",
          background: C.navyDeep,
          boxShadow: "0 30px 70px -20px rgba(10,20,60,0.5)",
          border: "7px solid #0A1530",
        }}
      >
        <StatusBar />
        {screen !== "home" && (
          <TopBar
            title={titles[screen]}
            logo={false}
            onSearch={() => setScreen("search")}
            onBack={
              backScreens.includes(screen)
                ? () => {
                    if (["community", "chats", "customers", "subscription", "videoCallList", "authority"].includes(screen)) return setScreen("settings");
                    if (screen === "scamMedia") return setScreen("alerts");
                    if (screen === "classroom") return setScreen("settings");
                    if (screen === "courseDetail") return setScreen("classroom");
                    if (screen === "lessonViewer") return setScreen("courseDetail");
                    if (screen === "videoCall") return setScreen("videoCallList");
                    if (screen === "compose" || screen === "postDetail") return setScreen("community");
                    if (screen === "chatThread") return setScreen("chats");
                    return setScreen("home");
                  }
                : null
            }
          />
        )}
        <div key={screen} className="holo-screen-enter" style={{ background: C.paper, minHeight: 440 }}>
          {screen === "home" && <HomeScreen onCheck={startCheck} t={t} onNotifications={() => setScreen("alerts")} credits={credits} userTier={userTier} />}
          {screen === "settings" && (
            <SettingsScreen
              selected={aiProvider}
              onSelect={setAiProvider}
              onClose={() => setScreen("home")}
              lang={lang}
              onLangChange={setLang}
              user={user}
              onSignOut={handleSignOut}
              kbStatus={kbStatus}
              onNavigate={(id) => {
                if (id === "diagnose") {
                  setCheckPurpose("diagnose");
                  setCheckMode("media");
                  return setScreen("check");
                }
                setScreen(id);
              }}
            />
          )}
          {screen === "subscription" && <SubscriptionScreen onSubscribe={handleSubscribe} userTier={userTier} credits={credits} />}
          {screen === "check" && <CheckScreen mode={checkMode} onDone={finishScan} defaultPurpose={checkPurpose} />}
          {screen === "result" && <ResultScreen score={lastScore ?? 50} mode={checkMode} onFinish={() => setScreen("home")} onLearnMore={() => setScreen("alerts")} historyId={currentHistoryId} onFeedback={submitFeedback} />}
          {screen === "linkCheck" && <LinkCheckScreen onDone={finishLinkCheck} />}
          {screen === "linkResult" && <LinkResultScreen url={checkedUrl} onFinish={() => setScreen("home")} historyId={currentHistoryId} onFeedback={submitFeedback} />}
          {screen === "phoneCheck" && <PhoneCheckScreen onDone={finishPhoneCheck} />}
          {screen === "phoneResult" && <PhoneResultScreen phone={checkedPhone} onFinish={() => setScreen("home")} historyId={currentHistoryId} onFeedback={submitFeedback} />}
          {screen === "qrCheck" && <QRCheckScreen onDone={finishQrCheck} />}
          {screen === "qrResult" && <QRResultScreen content={qrContent} onFinish={() => setScreen("home")} historyId={currentHistoryId} onFeedback={submitFeedback} />}
          {screen === "videoCallList" && (
            <VideoCallListScreen

          {screen === "videoCall" && <VideoCallScreen contact={callContact} onEnd={() => setScreen("videoCallList")} />}
          {screen === "diagnosisResult" && <DiagnosisResultScreen file={lastDiagnosisFile} onFinish={() => setScreen("home")} historyId={currentHistoryId} onFeedback={submitFeedback} />}
          {screen === "copyrightResult" && <CopyrightResultScreen result={lastCopyright} onFinish={() => setScreen("home")} historyId={currentHistoryId} onFeedback={submitFeedback} />}
          {screen === "search" && (
            <SearchScreen
              customers={customers}
              history={history}

              onOpenCustomer={() => setScreen("customers")}

          {screen === "authority" && <AuthorityContactScreen />}
          {screen === "scamMedia" && <ScamMediaViewerScreen update={viewingUpdate} onBack={() => setScreen("alerts")} />}
          {screen === "classroom" && (
            <ClassroomScreen
              onOpenCourse={(c) => {

          {screen === "courseDetail" && (
            <CourseDetailScreen

          {screen === "lessonViewer" && (
            <LessonViewerScreen

              isDone={completedLessons.has(`${activeCourse?.id}-${activeLessonIndex}`)}

              }}

          {screen === "messageCheck" && <MessageCheckScreen onDone={finishMessageCheck} />}
          {screen === "messageResult" && <MessageResultScreen text={checkedMessage} onFinish={() => setScreen("home")} historyId={currentHistoryId} onFeedback={submitFeedback} />}
          {screen === "manipCheck" && <ManipCheckScreen onDone={finishManipCheck} />}
          {screen === "manipResult" && <ManipResultScreen text={checkedScript} onFinish={() => setScreen("home")} historyId={currentHistoryId} onFeedback={submitFeedback} />}
          {screen === "quiz" && <QuizScreen onExit={() => setScreen("home")} />}
          {screen === "detectiveCheck" && <DetectiveCheckScreen onDone={finishDetectiveCase} />}
          {screen === "detectiveResult" && <DetectiveResultScreen caseData={detectiveCase} onFinish={() => setScreen("home")} historyId={currentHistoryId} onFeedback={submitFeedback} />}
          {screen === "wifiCheck" && <WiFiCheckScreen onDone={finishWifiCheck} />}
          {screen === "wifiResult" && <WiFiResultScreen answers={wifiAnswers} onFinish={() => setScreen("home")} historyId={currentHistoryId} onFeedback={submitFeedback} />}
          {screen === "factCheckScreen" && <FactCheckScreen onDone={finishFactCheck} />}
          {screen === "factCheckResult" && <FactCheckResultScreen data={factCheckData} onFinish={() => setScreen("home")} historyId={currentHistoryId} onFeedback={submitFeedback} />}
          {screen === "romanceCheck" && <RomanceCheckScreen onDone={finishRomanceCheck} />}

          {screen === "multiChannel" && (

          {screen === "community" && (
            <CommunityScreen

          {screen === "postDetail" && <PostDetailScreen post={activePost} onAddComment={addComment} onBack={() => setScreen("community")} />}
          {screen === "chats" && (
            <ChatListScreen
              chats={chats}
              onOpenChat={(c) => {

          {screen === "alerts" && (

        <BottomNav
          active={screen === "alerts" || screen === "scamMedia" ? "alerts" : backScreens.includes(screen) ? "home" : screen}

          }}

            setScreen("home");
          }}
        />
      )}
    </div>
  );
}


// ---------- Phòng thủ đa kênh tự động ----------
// Bản demo: mô phỏng trạng thái giám sát trên nhiều kênh liên lạc cùng lúc
// (cuộc gọi, SMS, mạng xã hội, email, app nhắn tin). App thật cần tích hợp
// API/permission riêng cho từng kênh (Call Screening API trên Android, tích
// hợp SMS Retriever, webhook từ nền tảng mạng xã hội...). Số liệu "đã chặn"
// dưới đây được sinh ngẫu nhiên có kiểm soát theo ngày để mô phỏng hoạt
// động thật mà không cần gọi mạng.
const DEFENSE_CHANNELS = [
  { id: "calls", icon: Phone, label: "Cuộc Gọi Đến", color: "#2E5BFF", desc: "Tự động chấm điểm rủi ro số lạ trước khi bạn nghe máy" },
  { id: "sms", icon: MessageSquare, label: "Tin Nhắn SMS", color: "#1FAE6B", desc: "Quét link/nội dung lừa đảo trong tin nhắn đến" },
  { id: "social", icon: Users2, label: "Mạng Xã Hội", color: "#7C3AED", desc: "Cảnh báo tin nhắn lạ, lời mời kết bạn đáng ngờ" },
  { id: "email", icon: Mail, label: "Email", color: "#E07A2E", desc: "Phát hiện email giả mạo ngân hàng, dịch vụ công" },
  { id: "chatApps", icon: MessageCircle, label: "App Nhắn Tin (Zalo/Messenger)", color: "#0EA5A0", desc: "Quét link và file đính kèm đáng ngờ trong hội thoại" },
];

function seededChannelCount(id, day) {
  let h = 0;
  for (let i = 0; i < id.length; i++) h = (h * 31 + id.charCodeAt(i)) % 97;
  return ((h + day * 7) % 23) + 1;
}

function MultiChannelDefenseScreen({ enabled, onToggleMaster, channelState, onToggleChannel, locked, onRequireUpgrade }) {
  const day = new Date().getDate();
  const totalBlocked = DEFENSE_CHANNELS.reduce((sum, c) => sum + seededChannelCount(c.id, day), 0);

  return (
    <div style={{ padding: "18px 16px 8px" }}>
      <div style={{ background: enabled ? "linear-gradient(135deg, #1FAE6B, #0E8F58)" : "linear-gradient(135deg, #8391B8, #5E6690)", borderRadius: 16, padding: "18px 16px", marginBottom: 16, color: "#fff" }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <Signal size={22} />
            <div>
              <div style={{ fontFamily: "'Be Vietnam Pro', sans-serif", fontWeight: 800, fontSize: 15 }}>Phòng Thủ Đa Kênh Tự Động</div>
              <div style={{ fontFamily: "'Be Vietnam Pro', sans-serif", fontSize: 11, opacity: 0.9, marginTop: 2 }}>{enabled ? "Đang giám sát mọi kênh liên lạc" : "Hiện đang tắt"}</div>
            </div>
          </div>
          <button
            onClick={() => (locked ? onRequireUpgrade() : onToggleMaster())}
            style={{ width: 46, height: 26, borderRadius: 999, border: "none", background: enabled ? "rgba(255,255,255,0.9)" : "rgba(255,255,255,0.3)", position: "relative", cursor: "pointer", flexShrink: 0 }}
          >
            <span style={{ position: "absolute", top: 2, left: enabled ? 22 : 2, width: 22, height: 22, borderRadius: "50%", background: enabled ? "#1FAE6B" : "#fff", transition: "left 0.15s" }} />
          </button>
        </div>
        {enabled && (
          <div style={{ marginTop: 12, fontFamily: "'Be Vietnam Pro', sans-serif", fontSize: 12.5, background: "rgba(255,255,255,0.15)", borderRadius: 10, padding: "8px 12px" }}>
            Đã tự động chặn/cảnh báo <b>{totalBlocked}</b> lượt nghi lừa đảo hôm nay trên tất cả kênh.
          </div>
        )}
      </div>

      {locked && (
        <div style={{ background: C.warnBg, borderRadius: 12, padding: "12px 14px", marginBottom: 16, display: "flex", gap: 8 }}>
          <Crown size={15} color="#B9760A" style={{ flexShrink: 0, marginTop: 1 }} />
          <div style={{ fontFamily: "'Be Vietnam Pro', sans-serif", fontSize: 12, color: "#7A5410", lineHeight: 1.5 }}>
            Tính năng này dành cho gói <b>Pro</b> trở lên. Nâng cấp để bật giám sát tự động trên tất cả kênh.
          </div>
        </div>
      )}

      <div style={{ fontFamily: "'Be Vietnam Pro', sans-serif", fontWeight: 800, fontSize: 13, color: C.navyDeep, marginBottom: 10 }}>Trạng Thái Từng Kênh</div>
      <div style={{ background: "#fff", borderRadius: 14, overflow: "hidden", marginBottom: 16 }}>
        {DEFENSE_CHANNELS.map((c, i) => {
          const on = enabled && channelState[c.id] !== false;
          const blocked = seededChannelCount(c.id, day);
          return (
            <div key={c.id} style={{ display: "flex", alignItems: "center", gap: 12, padding: "13px 14px", borderBottom: i < DEFENSE_CHANNELS.length - 1 ? "1px solid #EEF0F6" : "none" }}>
              <span style={{ width: 34, height: 34, borderRadius: 9, background: `${c.color}1A`, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                <c.icon size={16} color={c.color} />
              </span>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontFamily: "'Be Vietnam Pro', sans-serif", fontWeight: 700, fontSize: 12.5, color: C.navyDeep }}>{c.label}</div>
                <div style={{ fontFamily: "'Be Vietnam Pro', sans-serif", fontSize: 10.5, color: C.textMuted, marginTop: 2 }}>{on ? `Đã chặn ${blocked} lượt hôm nay` : c.desc}</div>
              </div>
              <button
                onClick={() => (locked ? onRequireUpgrade() : onToggleChannel(c.id))}
                disabled={!enabled}
                style={{ width: 38, height: 22, borderRadius: 999, border: "none", background: on ? c.color : "#E3E7F3", position: "relative", cursor: enabled ? "pointer" : "not-allowed", flexShrink: 0, opacity: enabled ? 1 : 0.5 }}
              >
                <span style={{ position: "absolute", top: 2, left: on ? 18 : 2, width: 18, height: 18, borderRadius: "50%", background: "#fff", transition: "left 0.15s" }} />
              </button>
            </div>
          );
        })}
      </div>

      <div style={{ fontFamily: "'Be Vietnam Pro', sans-serif", fontSize: 11.5, color: C.textMuted, lineHeight: 1.6, display: "flex", gap: 6 }}>
        <ShieldAlert size={13} style={{ flexShrink: 0, marginTop: 1 }} />
        Khi bật, Truvexa AI sẽ tự động chấm điểm rủi ro trên từng kênh và gửi cảnh báo ngay khi phát hiện dấu hiệu lừa đảo, kể cả khi bạn không tự mở app kiểm tra.
      </div>
    </div>
  );
}

// ---------- Mở khoá mật khẩu gia đình ----------
// Ý tưởng: một thành viên gia đình (thường là con cháu) đặt mã PIN chung.
// Khi hệ thống phát hiện rủi ro cao (ví dụ kết quả kiểm tra ở mức nguy
// hiểm), người dùng (thường là cha mẹ/ông bà) phải nhập đúng mã PIN gia
// đình mới có thể tiếp tục/bỏ qua cảnh báo — buộc họ phải gọi điện hỏi ý
// kiến người thân trước khi làm theo yêu cầu của kẻ lừa đảo.
function FamilyLockScreen({ familyLock, onUpdate }) {
  const [pinInput, setPinInput] = useState(familyLock.pin || "");
  const [nameInput, setNameInput] = useState("");
  const [phoneInput, setPhoneInput] = useState("");

  const savePin = () => {
    if (pinInput.trim().length < 4) return;
    onUpdate({ ...familyLock, pin: pinInput.trim() });
  };

  const addMember = () => {
    if (!nameInput.trim()) return;
    onUpdate({ ...familyLock, members: [...familyLock.members, { id: Date.now(), name: nameInput.trim(), phone: phoneInput.trim() }] });
    setNameInput("");
    setPhoneInput("");
  };

  const removeMember = (id) => {
    onUpdate({ ...familyLock, members: familyLock.members.filter((m) => m.id !== id) });
  };

  return (
    <div style={{ padding: "18px 16px 8px" }}>
      <div style={{ background: "linear-gradient(135deg, #2E5BFF, #1B3B8C)", borderRadius: 16, padding: "18px 16px", marginBottom: 16, color: "#fff" }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <Lock size={22} />
            <div>
              <div style={{ fontFamily: "'Be Vietnam Pro', sans-serif", fontWeight: 800, fontSize: 15 }}>Mở Khoá Mật Khẩu Gia Đình</div>
              <div style={{ fontFamily: "'Be Vietnam Pro', sans-serif", fontSize: 11, opacity: 0.9, marginTop: 2 }}>Yêu cầu mã PIN gia đình khi phát hiện rủi ro cao</div>
            </div>
          </div>
          <button
            onClick={() => onUpdate({ ...familyLock, enabled: !familyLock.enabled })}
            style={{ width: 46, height: 26, borderRadius: 999, border: "none", background: familyLock.enabled ? "rgba(255,255,255,0.9)" : "rgba(255,255,255,0.3)", position: "relative", cursor: "pointer", flexShrink: 0 }}
          >
            <span style={{ position: "absolute", top: 2, left: familyLock.enabled ? 22 : 2, width: 22, height: 22, borderRadius: "50%", background: familyLock.enabled ? "#2E5BFF" : "#fff", transition: "left 0.15s" }} />
          </button>
        </div>
      </div>

      <div style={{ background: "#fff", borderRadius: 14, padding: 16, marginBottom: 16 }}>
        <div style={{ fontFamily: "'Be Vietnam Pro', sans-serif", fontWeight: 700, fontSize: 13, color: C.navyDeep, marginBottom: 10 }}>Mã PIN Gia Đình</div>
        <div style={{ display: "flex", gap: 8 }}>
          <input
            type="tel"
            maxLength={6}
            value={pinInput}
            onChange={(e) => setPinInput(e.target.value.replace(/\D/g, ""))}
            placeholder="Đặt mã PIN 4-6 số"
            style={{ flex: 1, padding: "11px 14px", borderRadius: 10, border: "1.5px solid #E3E7F3", fontFamily: "'Be Vietnam Pro', sans-serif", fontSize: 14, letterSpacing: 3, boxSizing: "border-box" }}
          />
          <button onClick={savePin} disabled={pinInput.trim().length < 4} style={{ background: pinInput.trim().length < 4 ? "#C9D0E8" : "#2E5BFF", color: "#fff", border: "none", borderRadius: 10, padding: "0 16px", fontFamily: "'Be Vietnam Pro', sans-serif", fontWeight: 700, fontSize: 13, cursor: pinInput.trim().length < 4 ? "not-allowed" : "pointer" }}>
            Lưu
          </button>
        </div>
        {familyLock.pin && <div style={{ fontFamily: "'Be Vietnam Pro', sans-serif", fontSize: 11, color: C.safe, marginTop: 8, display: "flex", alignItems: "center", gap: 4 }}><Check size={12} /> Đã đặt mã PIN gia đình</div>}
      </div>

      <div style={{ background: "#fff", borderRadius: 14, padding: 16, marginBottom: 16 }}>

function FamilyUnlockModal({ onUnlock, onCancel, correctPin }) {
  const [pin, setPin] = useState("");
  const [error, setError] = useState(false);

  const submit = () => {
    if (pin === correctPin) {
      onUnlock();
    } else {
      setError(true);
      setPin("");
    }
  };

  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(10,15,40,0.75)", zIndex: 9000, display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}>
      <div style={{ background: "#fff", borderRadius: 16, padding: "22px 20px", width: "100%", maxWidth: 320, textAlign: "center" }}>
        <Lock size={28} color="#2E5BFF" style={{ marginBottom: 8 }} />
        <div style={{ fontFamily: "'Be Vietnam Pro', sans-serif", fontWeight: 800, fontSize: 15, color: C.navyDeep }}>Yêu Cầu Mã PIN Gia Đình</div>
        <div style={{ fontFamily: "'Be Vietnam Pro', sans-serif", fontSize: 12, color: C.textMuted, marginTop: 6, lineHeight: 1.5 }}>
          Đây là cảnh báo rủi ro cao. Hãy gọi hỏi người thân để lấy mã PIN trước khi tiếp tục.
        </div>
        <input
          type="tel"
          maxLength={6}
          value={pin}
          onChange={(e) => {
            setPin(e.target.value.replace(/\D/g, ""));
            setError(false);
          }}
          placeholder="Nhập mã PIN"
          style={{ width: "100%", marginTop: 14, padding: "12px 14px", borderRadius: 10, border: error ? "1.5px solid #E5342C" : "1.5px solid #E3E7F3", fontFamily: "'Be Vietnam Pro', sans-serif", fontSize: 16, letterSpacing: 4, textAlign: "center", boxSizing: "border-box" }}
        />
        {error && <div style={{ fontFamily: "'Be Vietnam Pro', sans-serif", fontSize: 11.5, color: C.danger, marginTop: 6 }}>Mã PIN không đúng, thử lại.</div>}
        <button onClick={submit} disabled={pin.length < 4} style={{ width: "100%", marginTop: 14, background: pin.length < 4 ? "#C9D0E8" : "#2E5BFF", color: "#fff", border: "none", borderRadius: 10, padding: "12px 0", fontFamily: "'Be Vietnam Pro', sans-serif", fontWeight: 700, fontSize: 13.5, cursor: pin.length < 4 ? "not-allowed" : "pointer" }}>
          Mở Khoá
        </button>
        <button onClick={onCancel} style={{ width: "100%", marginTop: 8, background: "none", border: "none", color: C.textMuted, fontFamily: "'Be Vietnam Pro', sans-serif", fontWeight: 700, fontSize: 12.5, padding: "8px 0", cursor: "pointer" }}>
          Huỷ, quay lại an toàn
        </button>
      </div>
    </div>
  );
}

// ---------- Bộ bắt lỗi React (Error Boundary) ----------
// Khác với window.onerror (đôi khi chỉ hiện "Script error." chung chung do
// trình duyệt che chi tiết lỗi từ các thư viện tải qua CDN), Error Boundary
// của chính React sẽ luôn nhận được đầy đủ thông báo lỗi + vị trí, vì nó
// chạy trong đúng ngữ cảnh mã nguồn của app.
class TruvexaErrorBoundary extends React.Component {
  constructor(props) {
    super(props);
    this.state = { error: null, info: null };
  }
  static getDerivedStateFromError(error) {
    return { error };
  }
  componentDidCatch(error, info) {
    this.setState({ info });
    console.error("Truvexa lỗi render:", error, info);
  }
  render() {
    if (this.state.error) {
      const err = this.state.error;
      return React.createElement(
        "div",
        {
          style: {
            position: "fixed",
            inset: 0,
            zIndex: 99999,
            background: "#1a0000",
            color: "#ffdddd",
            font: "12px/1.5 monospace",
            padding: 16,
            overflow: "auto",
            whiteSpace: "pre-wrap",
            wordBreak: "break-word",
          },
        },
        React.createElement("b", { style: { color: "#ff6666" } }, "Lỗi khi hiển thị ứng dụng: " + (err && err.message ? err.message : String(err))),
        React.createElement("div", { style: { marginTop: 10 } }, err && err.stack ? String(err.stack) : "(không có stack trace)"),
        this.state.info ? React.createElement("div", { style: { marginTop: 10, opacity: 0.8 } }, String(this.state.info.componentStack || "")) : null
      );
    }
    return this.props.children;
  }
}

// ---------- Mount ứng dụng vào DOM ----------
const rootEl = document.getElementById("root");
ReactDOM.createRoot(rootEl).render(
  React.createElement(TruvexaErrorBoundary, null, React.createElement(ScamGuardApp))
);
