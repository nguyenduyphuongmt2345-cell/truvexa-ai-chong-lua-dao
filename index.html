    <div id="error-overlay" style="display:none; position:fixed; inset:0; z-index:99999; background:#1a0000; color:#ffdddd; font:12px/1.5 monospace; padding:16px; overflow:auto; white-space:pre-wrap; word-break:break-word;"></div>
    <script>
      (function () {
        var overlay = document.getElementById('error-overlay');
        var shown = false;
        function showError(title, detail) {
          shown = true;
          overlay.style.display = 'block';
          var box = document.createElement('div');
          box.style.marginBottom = '14px';
          box.style.borderBottom = '1px solid #552222';
          box.style.paddingBottom = '10px';
          box.innerHTML = '<b style="color:#ff6666">' + title + '</b><br>' + detail;
          overlay.appendChild(box);
          var fb = document.getElementById('loading-fallback');
          if (fb) fb.innerText = 'Đã xảy ra lỗi — xem chi tiết bên dưới ↓';
        }
        window.addEventListener('error', function (e) {
          showError('Lỗi JS: ' + (e.message || 'không rõ'),
            (e.filename ? 'File: ' + e.filename + ':' + e.lineno + ':' + e.colno + '<br>' : '') +
            (e.error && e.error.stack ? String(e.error.stack).replace(/</g, '&lt;') : ''));
        });
        window.addEventListener('unhandledrejection', function (e) {
          var reason = e.reason;
          showError('Lỗi Promise (async)',
            (reason && reason.stack ? String(reason.stack).replace(/</g, '&lt;') : String(reason)));
        });
        setTimeout(function () {
          var fb = document.getElementById('loading-fallback');
          if (fb && fb.isConnected && !shown) {
            showError('Không có lỗi JS nào được bắt, nhưng app chưa render sau 6 giây',

        }, 6000);
      })();

// ---------- Backend thật — Firebase (Authentication + Firestore) ----------
// Đây là cấu hình dự án Firebase THẬT của Truvexa AI. Không cần giấu các
// giá trị này — theo đúng thiết kế của Firebase, "apiKey" ở đây không
// phải bí mật (nó chỉ định danh dự án, không cấp quyền truy cập); quyền
// truy cập dữ liệu thật sự được kiểm soát bằng "Security Rules" cấu hình
// trong Firebase Console (Firestore Database → Rules), KHÔNG phải bằng
// việc giấu config này.
//
// QUAN TRỌNG VỀ CÁCH TẢI: Firebase được tải bằng import() ĐỘNG (dynamic
// import), KHÔNG dùng "import ... from" tĩnh ở đầu file. Lý do: nếu dùng
// import tĩnh mà CDN Firebase gặp sự cố (đổi phiên bản, mất mạng, bị
// chặn...), TOÀN BỘ app sẽ không tải được gì cả (kể cả các phần không
// liên quan tới Firebase) — đây chính là lỗi đã từng xảy ra. Dùng import
// động cho phép app tiếp tục chạy bình thường (ở chế độ không đồng bộ dữ
// liệu) ngay cả khi Firebase gặp sự cố.
const firebaseConfig = {
  apiKey: "AIzaSyD7qJsUUvBgsT54xfAxmwOzQIna-G-FC7E",
  authDomain: "truvexa-ai.firebaseapp.com",
  projectId: "truvexa-ai",
  storageBucket: "truvexa-ai.firebasestorage.app",
  messagingSenderId: "1035662783926",
  appId: "1:1035662783926:web:b081ccc1fd339235c3fd17",
};

const FB = {}; // sẽ được điền đầy đủ sau khi initFirebase() tải xong
let firebaseReady = false;

async function initFirebase() {
  try {
    const [{ initializeApp }, authMod, storeMod] = await Promise.all([
      import("https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js"),
      import("https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js"),
      import("https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js"),
    ]);
    const app = initializeApp(firebaseConfig);
    FB.auth = authMod.getAuth(app);
    FB.db = storeMod.getFirestore(app);
    FB.GoogleAuthProvider = authMod.GoogleAuthProvider;
    FB.signInWithPopup = authMod.signInWithPopup;
    FB.signInWithRedirect = authMod.signInWithRedirect;
    FB.getRedirectResult = authMod.getRedirectResult;
    FB.onAuthStateChanged = authMod.onAuthStateChanged;
    FB.signOut = authMod.signOut;
    FB.doc = storeMod.doc;
    FB.getDoc = storeMod.getDoc;
    FB.setDoc = storeMod.setDoc;
    firebaseReady = true;
    return true;
  } catch (e) {
    // Nếu Firebase gặp sự cố (đổi phiên bản CDN, mất mạng, bị chặn...),
    // app vẫn chạy được ở chế độ "Khách" (dữ liệu chỉ lưu tạm trên máy),
    // KHÔNG bị crash toàn bộ.
    console.error("Không khởi tạo được Firebase:", e);
    firebaseReady = false;
    return false;
  }
}
// Bắt đầu tải Firebase ngay khi app khởi động, chạy song song ngầm —
// không chặn phần còn lại của app tải/hiển thị.
const firebaseInitPromise = initFirebase();

// Đọc dữ liệu người dùng đã lưu trên Firestore (dùng lại giữa các thiết
// bị/lần đăng nhập), ghi vào tài liệu users/{uid}.
async function loadUserData(uid) {
  await firebaseInitPromise;
  if (!firebaseReady || !uid) return null;
  try {
    const snap = await FB.getDoc(FB.doc(FB.db, "users", uid));
    return snap.exists() ? snap.data() : null;
  } catch (e) {
    console.error("Lỗi tải dữ liệu Firestore:", e);
    return null;
  }
}

// Lưu dữ liệu người dùng lên Firestore — gọi hàm này (có debounce ở nơi
// dùng) mỗi khi lịch sử/khách hàng/đánh giá thay đổi.
async function saveUserData(uid, data) {
  await firebaseInitPromise;
  if (!firebaseReady || !uid) return false;
  try {
    await FB.setDoc(FB.doc(FB.db, "users", uid), { ...data, updatedAt: Date.now() }, { merge: true });
    return true;
  } catch (e) {
    console.error("Lỗi lưu dữ liệu Firestore:", e);
    return false;
  }
}

// ---------- Giọng nói: đọc to (TTS) và nói để nhập (STT) ----------
// Dùng Web Speech API có sẵn trong trình duyệt — miễn phí, không cần API
// key. Hoạt động tốt trên Chrome Android; Safari/iOS hỗ trợ đọc to tốt,
// nhận diện giọng nói có thể hạn chế hơn tuỳ phiên bản iOS.

// ---------- Chia sẻ sang app khác ----------
// Dùng Web Share API có sẵn trong trình duyệt điện thoại — mở đúng bảng
// chia sẻ gốc của máy (Zalo, Messenger, Facebook, SMS...), không cần tích
// hợp riêng từng app. Trên máy tính/trình duyệt không hỗ trợ, tự động copy
// nội dung vào clipboard thay thế.
function ShareButton({ title = "Truvexa AI", text, url, size = 13 }) {
  const [copied, setCopied] = useState(false);

  const share = async () => {
    if (navigator.share) {
      try {
        await navigator.share({ title, text, url });
      } catch (e) {
        // người dùng bấm huỷ hộp thoại chia sẻ — bỏ qua, không phải lỗi
      }
    } else {
      try {
        await navigator.clipboard.writeText(url ? `${text}\n${url}` : text);
        setCopied(true);
        setTimeout(() => setCopied(false), 1500);
      } catch (e) {
        // clipboard có thể bị chặn trong khung xem trước
      }
    }
  };

  return (
    <button
      onClick={share}
      style={{
        display: "inline-flex",
        alignItems: "center",
        gap: 4,
        background: "none",
        border: "1px solid #E3E7F3",
        borderRadius: 999,
        padding: "4px 9px",
        cursor: "pointer",
        color: "#2E5BFF",
        fontFamily: "'Be Vietnam Pro', sans-serif",
        fontSize: 11,
        fontWeight: 600,
      }}
    >
      <Share2 size={size} /> {copied ? "Đã copy!" : "Chia Sẻ"}
    </button>
  );
}

function SpeakButton({ text, lang = "vi-VN", size = 13 }) {
  const [speaking, setSpeaking] = useState(false);

  const toggle = () => {
    if (typeof window === "undefined" || !window.speechSynthesis) return;
    if (speaking) {
      window.speechSynthesis.cancel();
      setSpeaking(false);
      return;
    }
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = lang;
    utter.onend = () => setSpeaking(false);
    utter.onerror = () => setSpeaking(false);
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(utter);
    setSpeaking(true);
  };

  return (
    <button
      onClick={toggle}
      title="Đọc to"
      style={{
        display: "inline-flex",
        alignItems: "center",
        gap: 4,
        background: speaking ? "#E9EEFF" : "none",
        border: "1px solid #E3E7F3",
        borderRadius: 999,
        padding: "4px 9px",
        cursor: "pointer",
        color: "#2E5BFF",
        fontFamily: "'Be Vietnam Pro', sans-serif",
        fontSize: 11,
        fontWeight: 600,
      }}
    >
      {speaking ? <Square size={size - 3} /> : <VolumeIcon size={size} />}
      {speaking ? "Dừng" : "Đọc to"}
    </button>
  );
}

function VoiceInputButton({ onResult, lang = "vi-VN" }) {
  const [listening, setListening] = useState(false);
  const recognitionRef = useRef(null);

  const toggle = () => {
    const SR = typeof window !== "undefined" && (window.SpeechRecognition || window.webkitSpeechRecognition);
    if (!SR) {
      alert("Trình duyệt này chưa hỗ trợ nhận diện giọng nói. Hãy thử bằng Chrome trên Android.");
      return;
    }
    if (listening) {
      recognitionRef.current?.stop();
      setListening(false);
      return;
    }
    const recognition = new SR();
    recognition.lang = lang;
    recognition.interimResults = false;
    recognition.maxAlternatives = 1;
    recognition.onresult = (e) => {
      const transcript = e.results[0][0].transcript;
      onResult(transcript);
    };
    recognition.onend = () => setListening(false);
    recognition.onerror = () => setListening(false);
    recognitionRef.current = recognition;
    recognition.start();
    setListening(true);
  };

  return (
    <button
      onClick={toggle}
      title="Nói để nhập"
      style={{
        display: "inline-flex",
        alignItems: "center",
        gap: 4,
        background: listening ? "#FDECEC" : "#F0F3FC",
        border: "none",
        borderRadius: 999,
        padding: "6px 11px",
        cursor: "pointer",
        color: listening ? "#E5342C" : "#2E5BFF",
        fontFamily: "'Be Vietnam Pro', sans-serif",
        fontSize: 11.5,
        fontWeight: 700,
      }}
    >
      <MicIcon2 size={13} style={{ animation: listening ? "pulse 1s infinite" : "none" }} />
      {listening ? "Đang nghe…" : "Nói để nhập"}
    </button>
  );
}

// ---------- demo heuristics (illustrative, not a trained model) ----------
function simulateMediaScan(file) {
  let seed = 0;
  for (let i = 0; i < file.name.length; i++) seed += file.name.charCodeAt(i);
  seed += Math.round(file.size / 1024) % 89;
  return Math.max(6, Math.min(97, 18 + (seed % 78)));
}

// Kho tác phẩm mẫu dùng để mô phỏng "trùng khớp bản quyền" — bản demo,
// không phải cơ sở dữ liệu bản quyền thật (giống Content ID của YouTube).
// Bản triển khai thật cần nối vào dịch vụ nhận diện nội dung (ACRCloud,
// Audible Magic, YouTube Content ID API...) qua backend riêng.
const DEMO_COPYRIGHT_WORKS = [
  { title: "Bản nhạc nền thương mại #A17", owner: "Hãng thu âm Sao Việt", type: "Âm nhạc" },
  { title: "Đoạn phim quảng cáo lưu trữ #C204", owner: "Công ty Truyền Thông Ánh Dương", type: "Video" },
  { title: "Bộ ảnh stock #IMG-5521", owner: "ShutterVN Stock Photo", type: "Hình ảnh" },
  { title: "Bản thu âm giọng đọc #V88", owner: "Studio Lồng Tiếng Hoàng Gia", type: "Giọng nói" },
  { title: "Nhạc nền phim ngắn #B305", owner: "Nhà sản xuất Mộc Lan Films", type: "Âm nhạc" },
];

function simulateCopyrightCheck(file, mediaKind) {
  let seed = 7;
  const name = (file && file.name) || "file";
  for (let i = 0; i < name.length; i++) seed += name.charCodeAt(i) * (i + 1);
  seed += file ? Math.round(file.size / 1024) % 97 : 0;

  const matchScore = seed % 100; // 0-99, càng cao càng dễ "trùng khớp"
  const matched = matchScore >= 45;
  const work = matched ? DEMO_COPYRIGHT_WORKS[seed % DEMO_COPYRIGHT_WORKS.length] : null;
  const confidence = matched ? Math.max(41, Math.min(98, matchScore)) : Math.max(2, 100 - matchScore) % 30;

  return { matched, confidence, work, mediaKind };
}

function HoloImage({ src, alt, fallback, height, borderRadius, style }) {
  const [failed, setFailed] = useState(false);
  const box = { width: "100%", height: height || "100%", borderRadius: borderRadius ?? 0, overflow: "hidden", position: "relative", ...style };
  if (failed || !src) {
    return <div style={{ ...box, background: fallback || "linear-gradient(135deg, #1B3B8C, #4C6FFF)" }} />;
  }
  return (
    <div style={box}>
      <img
        src={src}
        alt={alt || ""}
        onError={() => setFailed(true)}
        style={{ width: "100%", height: "100%", objectFit: "cover", display: "block" }}
      />
    </div>
  );
}

function FeedbackWidget({ historyId, type, title, content, onFeedback, existing }) {
  const [showNote, setShowNote] = useState(false);
  const [note, setNote] = useState("");
  const [submitted, setSubmitted] = useState(!!existing);
  const [choice, setChoice] = useState(existing?.rating || null);

  if (submitted) {
    return (
      <div style={{ background: "#F4F6FB", borderRadius: 12, padding: "12px 14px", marginBottom: 16, display: "flex", alignItems: "center", gap: 8 }}>

            onClick={() => submit("up", "")}
            style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", gap: 6, padding: "10px 0", borderRadius: 9, border: "1.5px solid #CDEBDC", background: "#F1FBF6", color: C.safe, fontFamily: "'Be Vietnam Pro', sans-serif", fontWeight: 700, fontSize: 13, cursor: "pointer" }}

function CheckScreen({ mode, onDone, defaultPurpose }) {
  const [file, setFile] = useState(null);
  const [preview, setPreview] = useState(null);
  const [scanning, setScanning] = useState(false);
  const [progress, setProgress] = useState(0);
  const [purpose, setPurpose] = useState(defaultPurpose || "scam");
  const fileRef = useRef(null);

  const pick = (f) => {
    if (!f) return;
    setFile(f);
    if (f.type.startsWith("image")) {
      const r = new FileReader();
      r.onload = (e) => setPreview(e.target.result);
      r.readAsDataURL(f);
    } else {
      setPreview(null);
    }
  };

  const start = () => {
    setScanning(true);
    setProgress(0);
    const iv = setInterval(() => {
      setProgress((p) => {
        if (p >= 100) {
          clearInterval(iv);
          if (purpose === "copyright") {
            const result = simulateCopyrightCheck(file, mode === "voice" ? "audio" : "video/ảnh");
            setTimeout(() => onDone(result.matched ? result.confidence : 100 - result.confidence, mode, purpose, result), 250);
            return 100;
          }
          const score = file ? simulateMediaScan(file) : 50 + Math.round(Math.random() * 40);
          setTimeout(() => onDone(score, mode, purpose, null, file), 250);
          return 100;
        }
        return p + 7;
      });
    }, 110);
  };

  const purposeSelector = mode === "media" && (
    <div style={{ display: "flex", gap: 8, marginBottom: 14, flexWrap: "wrap" }}>
      {[
        { id: "scam", label: "Kiểm Tra Lừa Đảo", icon: ShieldAlert, color: "#2E5BFF" },
        { id: "diagnose", label: "Nhận Diện & Chẩn Đoán", icon: Leaf, color: "#1FAE6B" },
        { id: "copyright", label: "Quét Bản Quyền", icon: FileWarning, color: "#7C3AED" },
      ].map((p) => (
        <button
          key={p.id}
          onClick={() => setPurpose(p.id)}
          style={{
            flex: "1 1 30%",
            display: "flex",
            alignItems: "center",
            justifyContent: "center",
            gap: 6,
            padding: "10px 6px",
            borderRadius: 10,
            border: purpose === p.id ? `1.5px solid ${p.color}` : "1.5px solid #E3E7F3",
            background: purpose === p.id ? `${p.color}14` : "#fff",
            color: purpose === p.id ? p.color : C.textMuted,
            fontFamily: "'Be Vietnam Pro', sans-serif",
            fontWeight: 700,
            fontSize: 11.5,
            cursor: "pointer",
          }}
        >
          <p.icon size={13} /> {p.label}
        </button>
      ))}
    </div>
  );

  const voicePurposeSelector = mode === "voice" && (
    <div style={{ display: "flex", gap: 8, marginBottom: 14 }}>
      {[
        { id: "scam", label: "Kiểm Tra Lừa Đảo", icon: ShieldAlert, color: "#2E5BFF" },
        { id: "copyright", label: "Quét Bản Quyền", icon: FileWarning, color: "#7C3AED" },
      ].map((p) => (
        <button
          key={p.id}
          onClick={() => setPurpose(p.id)}
          style={{
            flex: 1,
            display: "flex",
            alignItems: "center",
            justifyContent: "center",
            gap: 6,
            padding: "10px 6px",
            borderRadius: 10,
            border: purpose === p.id ? `1.5px solid ${p.color}` : "1.5px solid #E3E7F3",
            background: purpose === p.id ? `${p.color}14` : "#fff",
            color: purpose === p.id ? p.color : C.textMuted,
            fontFamily: "'Be Vietnam Pro', sans-serif",
            fontWeight: 700,
            fontSize: 11.5,
            cursor: "pointer",
          }}
        >
          <p.icon size={13} /> {p.label}
        </button>
      ))}
    </div>
  );

  if (mode === "media") {
    return (
      <div style={{ padding: "16px 16px 8px" }}>
        {purposeSelector}
        <input ref={fileRef} type="file" accept="image/*,video/*" style={{ display: "none" }} onChange={(e) => pick(e.target.files?.[0])} />
        <div
          style={{
            background: "#111C3E",
            borderRadius: 16,
            overflow: "hidden",
            aspectRatio: "4 / 3",
            position: "relative",
            display: "flex",
            alignItems: "center",
            justifyContent: "center",
            cursor: preview ? "default" : "pointer",
          }}
          onClick={() => !preview && fileRef.current?.click()}
        >
          {preview ? (
            <img src={preview} alt="" style={{ width: "100%", height: "100%", objectFit: "cover" }} />
          ) : (
            <div style={{ textAlign: "center", color: "#7C88AA", fontFamily: "'Be Vietnam Pro', sans-serif", fontSize: 13 }}>
              <ImageIcon size={30} style={{ marginBottom: 8, opacity: 0.6 }} />
              <div>Chạm để chọn video hoặc ảnh</div>
            </div>
          )}

          {preview && !scanning && (
            <div
              style={{
                position: "absolute",
                inset: 0,
                background: "linear-gradient(180deg, transparent 60%, rgba(10,20,50,0.85))",
                display: "flex",
                alignItems: "flex-end",
                padding: "10px 12px",
              }}
            >
              <div style={{ width: "100%" }}>
                <div style={{ height: 3, background: "rgba(255,255,255,0.25)", borderRadius: 2, marginBottom: 8, position: "relative" }}>
                  <div style={{ position: "absolute", left: 0, top: -3.5, width: "35%", height: 3, background: C.danger, borderRadius: 2 }} />
                </div>
                <div style={{ display: "flex", justifyContent: "space-between", color: "#fff" }}>
                  <div style={{ display: "flex", gap: 12, alignItems: "center" }}>
                    <Play size={16} fill="#fff" />
                    <Volume2 size={15} />
                  </div>
                  <div style={{ display: "flex", gap: 12, alignItems: "center" }}>
                    <Settings size={14} />
                    <Maximize2 size={14} />
                  </div>
                </div>
              </div>
            </div>
          )}

          {scanning && (
            <div style={{ position: "absolute", inset: 0, background: "rgba(10,18,45,0.55)" }} />
          )}
        </div>

        {scanning ? (
          <div style={{ marginTop: 20, textAlign: "center" }}>
            <div style={{ fontFamily: "'Be Vietnam Pro', sans-serif", fontWeight: 700, fontSize: 15, color: C.navyDeep, marginBottom: 12 }}>
              Phân Tích Đang Diễn Ra…
            </div>
            <div style={{ width: "100%", height: 8, background: "#DFE4F2", borderRadius: 999, overflow: "hidden" }}>
              <div style={{ width: `${progress}%`, height: "100%", background: `linear-gradient(90deg, ${C.warn}, #4C6FFF)`, transition: "width 0.1s linear" }} />
            </div>
            <div style={{ fontFamily: "'Be Vietnam Pro', sans-serif", fontSize: 12.5, color: C.textMuted, marginTop: 10 }}>
              Đang kiểm tra dấu hiệu deepfake…
            </div>
          </div>
        ) : (
          <button
            onClick={() => (file ? start() : fileRef.current?.click())}
            style={{ width: "100%", marginTop: 18, background: "#2E5BFF", color: "#fff", border: "none", borderRadius: 10, padding: "13px 0", fontFamily: "'Be Vietnam Pro', sans-serif", fontWeight: 700, fontSize: 14, cursor: "pointer" }}
          >
            {file ? "Bắt Đầu Phân Tích" : "Chọn Tệp"}
          </button>
        )}
      </div>
    );
  }

  // voice mode
  return (
    <div style={{ padding: "16px 16px 8px" }}>
      {voicePurposeSelector}
      <input ref={fileRef} type="file" accept="audio/*" style={{ display: "none" }} onChange={(e) => pick(e.target.files?.[0])} />
      <div style={{ background: "#fff", borderRadius: 16, padding: "34px 16px", textAlign: "center" }}>
        <span
          style={{
            width: 64,
            height: 64,
            borderRadius: "50%",
            background: scanning ? C.dangerBg : "#EDF0FA",
            display: "inline-flex",
            alignItems: "center",
            justifyContent: "center",
            marginBottom: 14,
          }}
        >
          {purpose === "copyright" ? <FileWarning size={26} color={scanning ? C.danger : "#7C3AED"} /> : <Mic size={26} color={scanning ? C.danger : "#2E5BFF"} />}
        </span>
        <div style={{ fontFamily: "'Be Vietnam Pro', sans-serif", fontWeight: 700, fontSize: 14, color: C.navyDeep, marginBottom: 6 }}>
          {file ? file.name : purpose === "copyright" ? "Chưa chọn tệp giọng nói/nhạc" : "Chưa chọn tệp ghi âm"}
        </div>
        {!file && (
          <button onClick={() => fileRef.current?.click()} style={{ marginTop: 8, background: "#2E5BFF", color: "#fff", border: "none", borderRadius: 8, padding: "8px 18px", fontFamily: "'Be Vietnam Pro', sans-serif", fontWeight: 600, fontSize: 13, cursor: "pointer" }}>
            {purpose === "copyright" ? "Chọn Tệp Giọng Nói/Nhạc" : "Chọn Tệp Ghi Âm"}
          </button>
        )}
        {scanning && (
          <div style={{ marginTop: 18 }}>
            <div style={{ width: "100%", height: 8, background: "#EEF0F6", borderRadius: 999, overflow: "hidden" }}>
              <div style={{ width: `${progress}%`, height: "100%", background: `linear-gradient(90deg, ${C.warn}, #4C6FFF)`, transition: "width 0.1s linear" }} />
            </div>
            <div style={{ fontFamily: "'Be Vietnam Pro', sans-serif", fontSize: 12.5, color: C.textMuted, marginTop: 10 }}>
              {purpose === "copyright" ? "Đang đối chiếu với kho dữ liệu bản quyền…" : "Đang phân tích sóng âm giọng nói…"}
            </div>
          </div>
        )}
      </div>
      {!scanning && file && (
        <button onClick={start} style={{ width: "100%", marginTop: 16, background: "#2E5BFF", color: "#fff", border: "none", borderRadius: 10, padding: "13px 0", fontFamily: "'Be Vietnam Pro', sans-serif", fontWeight: 700, fontSize: 14, cursor: "pointer" }}>
        Bắt Đầu Phân Tích
        </button>
      )}
    </div>
  );
}

// ---------- Link checker ----------
// Ghi chú: bản demo này mô phỏng kết quả. Bản thật cần gọi backend, backend
// gọi Google Safe Browsing API (miễn phí) để kiểm tra link thật.
// ================== KHO TRI THỨC (TRUVEXA_KB) ==================
// Đây là "bộ não dữ liệu" dùng chung cho toàn app: số điện thoại lừa đảo,
// từ khoá lừa đảo, mẫu link đáng ngờ. Ban đầu app dùng danh sách mặc định
// bên dưới, sau đó cố gắng tải bản MỚI NHẤT từ file "tri-thuc.json" nằm
// cùng thư mục với index.html trên GitHub Pages.
//
// CÁCH "DẠY" APP HỌC THÊM KIẾN THỨC MỚI (không cần sửa code):
// 1. Vào repo trên GitHub, mở file "tri-thuc.json" (nếu chưa có, tạo mới).
// 2. Thêm số điện thoại / từ khoá / mẫu link lừa đảo mới phát hiện được
//    vào đúng mảng tương ứng, theo đúng định dạng JSON.
// 3. Commit changes. Lần sau ai mở app cũng sẽ tự động có kiến thức mới,
//    không cần đụng vào phần code chính này.
const TRUVEXA_KB = {
  version: 0,
  updatedAt: null,
  flaggedPhones: ["0900000000", "0888888888", "0123456789"],
  suspiciousLinkPatterns: ["bit.ly", "tinyurl", "zalo-", "-vn.", "khuyenmai", "trungthuong", ".xyz", ".top"],
  scamKeywordGroups: [
    { key: "urgency", weight: 16, label: "Tạo cảm giác khẩn cấp, thúc giục hành động ngay", words: ["gấp", "khẩn cấp", "ngay lập tức", "trong hôm nay", "kẻo muộn", "hết hạn"] },
    { key: "money", weight: 22, label: "Yêu cầu chuyển tiền / nạp tiền", words: ["chuyển khoản", "chuyển tiền", "vay tiền", "nạp tiền", "phí bảo hiểm", "phí vận chuyển"] },
    { key: "auth", weight: 24, label: "Yêu cầu thông tin nhạy cảm (OTP, mật khẩu, CCCD...)", words: ["mã otp", "mật khẩu", "cccd", "căn cước", "tài khoản ngân hàng", "xác minh tài khoản"] },
    { key: "prize", weight: 14, label: "Mồi câu bằng trúng thưởng/quà tặng", words: ["trúng thưởng", "quà tặng miễn phí", "voucher", "khuyến mãi đặc biệt"] },
    { key: "impersonate", weight: 12, label: "Giả danh cơ quan/tổ chức uy tín", words: ["công an", "toà án", "ngân hàng", "shipper", "bưu điện", "thuế"] },
  ],
  factCheckKeywordGroups: [
    { key: "sensational", weight: 16, label: "Dùng từ ngữ giật gân, gây sốc để câu view", words: ["chấn động", "sốc", "không thể tin nổi", "sự thật kinh hoàng", "gây bão mạng"] },
    { key: "noSource", weight: 22, label: "Không nêu nguồn tin rõ ràng, đáng tin cậy", words: ["nghe nói", "tin đồn", "một nguồn tin cho biết", "chưa xác thực", "nghe kể lại"] },
    { key: "deathHoax", weight: 26, label: "Tin đồn qua đời/tai nạn — dạng tin giả rất phổ biến về người nổi tiếng", words: ["qua đời", "đột quỵ", "tai nạn", "nhập viện nguy kịch", "trút hơi thở cuối cùng"] },
    { key: "fakeEndorsement", weight: 24, label: "Gán ghép người nổi tiếng quảng cáo/kêu gọi đầu tư — thường là giả mạo", words: ["xác nhận đầu tư", "kêu gọi đầu tư", "bí quyết làm giàu", "đại sứ thương hiệu", "giới thiệu sản phẩm"] },
    { key: "shareUrgency", weight: 14, label: "Thúc giục chia sẻ ngay trước khi bị gỡ", words: ["chia sẻ ngay", "trước khi bị gỡ", "lan truyền", "chia sẻ để mọi người biết"] },
  ],
};

async function loadRemoteKnowledge() {
  try {
    const res = await fetch("./tri-thuc.json", { cache: "no-store" });
    if (!res.ok) return false;
    const data = await res.json();

    if (Array.isArray(data.flaggedPhones)) {
      TRUVEXA_KB.flaggedPhones = Array.from(new Set([...TRUVEXA_KB.flaggedPhones, ...data.flaggedPhones]));
    }
    if (Array.isArray(data.suspiciousLinkPatterns)) {
      TRUVEXA_KB.suspiciousLinkPatterns = Array.from(new Set([...TRUVEXA_KB.suspiciousLinkPatterns, ...data.suspiciousLinkPatterns]));
    }
    if (Array.isArray(data.scamKeywordGroups)) {
      data.scamKeywordGroups.forEach((g) => {
        if (!g || !Array.isArray(g.words)) return;
        const existing = TRUVEXA_KB.scamKeywordGroups.find((eg) => eg.key === g.key);
        if (existing) {
          existing.words = Array.from(new Set([...existing.words, ...g.words]));
        } else if (g.key) {
          TRUVEXA_KB.scamKeywordGroups.push({ key: g.key, weight: g.weight || 12, label: g.label || g.key, words: g.words });
        }
      });
    }
    if (Array.isArray(data.factCheckKeywordGroups)) {
      data.factCheckKeywordGroups.forEach((g) => {
        if (!g || !Array.isArray(g.words)) return;
        const existing = TRUVEXA_KB.factCheckKeywordGroups.find((eg) => eg.key === g.key);
        if (existing) {
          existing.words = Array.from(new Set([...existing.words, ...g.words]));
        } else if (g.key) {
          TRUVEXA_KB.factCheckKeywordGroups.push({ key: g.key, weight: g.weight || 12, label: g.label || g.key, words: g.words });
        }
      });
    }
    TRUVEXA_KB.version = data.version || TRUVEXA_KB.version;
    TRUVEXA_KB.updatedAt = data.updatedAt || TRUVEXA_KB.updatedAt;
    return true;
  } catch (e) {
    // Không có mạng, hoặc chưa tạo file tri-thuc.json — app vẫn chạy tốt
    // với kiến thức mặc định có sẵn ở trên.
    return false;
  }
}

function simulateLinkCheck(url) {
  const suspiciousPatterns = TRUVEXA_KB.suspiciousLinkPatterns;
  const lower = url.toLowerCase();
  const hits = suspiciousPatterns.filter((p) => lower.includes(p));
  const isHttps = lower.startsWith("https://");
  let risk = hits.length * 22 + (isHttps ? 0 : 25) + 8;
  risk = Math.max(3, Math.min(96, risk));
  return { risk, hits, isHttps };
}

function LinkCheckScreen({ onDone }) {
  const [url, setUrl] = useState("");
  const [checking, setChecking] = useState(false);

  const check = () => {
    if (!url.trim()) return;
    setChecking(true);
    setTimeout(() => {
      setChecking(false);
      onDone(url.trim());
    }, 1100);
  };

  return (
    <div style={{ padding: "18px 16px 8px" }}>
      <div style={{ background: "#fff", borderRadius: 14, padding: 18 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 12 }}>
          <Link2 size={16} color="#2E5BFF" />
          <span style={{ fontFamily: "'Be Vietnam Pro', sans-serif", fontWeight: 700, fontSize: 14, color: C.navyDeep }}>
            Dán đường link cần kiểm tra
          </span>
        </div>
        <input
          value={url}
          onChange={(e) => setUrl(e.target.value)}
          placeholder="https://..."
          style={{
            width: "100%",
            padding: "12px 14px",
            borderRadius: 10,
            border: "1.5px solid #E3E7F3",
            fontFamily: "'Be Vietnam Pro', sans-serif",
            fontSize: 14,
            boxSizing: "border-box",
          }}
        />
        <div style={{ fontFamily: "'Be Vietnam Pro', sans-serif", fontSize: 11.5, color: C.textMuted, marginTop: 10, lineHeight: 1.5 }}>
          Ví dụ: link nhận được qua Zalo, Facebook, tin nhắn SMS mời trúng thưởng, khuyến mãi…
        </div>
      </div>

      <button
        disabled={!url.trim() || checking}
        onClick={check}
        style={{
          width: "100%",
          marginTop: 16,
          background: !url.trim() || checking ? "#C9D0E8" : "#2E5BFF",
          color: "#fff",
          border: "none",
          borderRadius: 10,
          padding: "13px 0",
          fontFamily: "'Be Vietnam Pro', sans-serif",
          fontWeight: 700,
          fontSize: 14,
          cursor: !url.trim() || checking ? "not-allowed" : "pointer",
        }}
      >
        {checking ? "Đang kiểm tra…" : "Kiểm Tra Ngay"}
      </button>
    </div>
  );
}

function LinkResultScreen({ url, onFinish, historyId, onFeedback }) {
  const { risk, hits, isHttps } = simulateLinkCheck(url);
  const risky = risk >= 55;
  const bg = risky ? C.dangerBg : C.safeBg;
  const fg = risky ? C.danger : C.safe;

  return (
    <div style={{ padding: "16px 16px 8px" }}>
      <div className="holo-card-enter holo-scan-wrap" style={holoCardStyle(holoTone(risky, uncertain))}>
        <div style={{ display: "flex", alignItems: "center", gap: 8, fontFamily: "'Be Vietnam Pro', sans-serif", fontWeight: 800, fontSize: 13.5, color: fg }}>
          <span className="holo-glow-icon" style={{ display: "inline-flex" }}>{risky ? <XCircle size={16} /> : <ShieldCheck size={16} />}</span>
          {risky ? "LINK CÓ DẤU HIỆU NGUY HIỂM" : "LINK CÓ VẺ AN TOÀN"}
        </div>
        <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 12, color: C.navyDeep, marginTop: 10, wordBreak: "break-all", background: "#fff", padding: "8px 10px", borderRadius: 8 }}>
          {url}
        </div>
        <div style={{ fontFamily: "'Be Vietnam Pro', sans-serif", fontSize: 12.5, color: "#5C6690", marginTop: 12 }}>
          Điểm rủi ro: <b style={{ color: fg }}>{risk}%</b>
          <ul style={{ margin: "8px 0 0", paddingLeft: 18 }}>
            {!isHttps && <li>Không dùng kết nối bảo mật HTTPS</li>}
            {hits.length > 0 && <li>Chứa từ khoá/định dạng thường gặp ở link lừa đảo</li>}
            {hits.length === 0 && isHttps && <li>Không phát hiện dấu hiệu bất thường rõ rệt</li>}
          </ul>
        </div>
      </div>
      <FeedbackWidget historyId={historyId} type="link" title="Kiểm Tra Link" content={url} onFeedback={onFeedback} />
      <button onClick={onFinish} style={{ width: "100%", background: "#2E5BFF", color: "#fff", border: "none", borderRadius: 10, padding: "13px 0", fontFamily: "'Be Vietnam Pro', sans-serif", fontWeight: 700, fontSize: 14, cursor: "pointer" }}>
        Xong
      </button>
    </div>
  );
}

// ---------- Message checker ----------
// Ghi chú: heuristic đơn giản chạy tại chỗ (demo). Bản thật nên gọi backend
// /api/analyze-text (đã có sẵn, dùng OpenAI/Gemini) để phân tích chính xác hơn.
function scoreMessage(raw) {
  const text = raw.trim();
  const lower = text.toLowerCase();

  const groups = TRUVEXA_KB.scamKeywordGroups;

  let score = 6;
  const signals = [];
  groups.forEach((g) => {
    const hit = g.words.some((w) => lower.includes(w));
    if (hit) {
      score += g.weight;
      signals.push(g.label);
    }
  });

  score = Math.max(3, Math.min(97, score));
  return { score, signals };
}

// ---------- Truy Vết Tin Giả & Giả Mạo Người Nổi Tiếng ----------
// GHI CHÚ QUAN TRỌNG: đây là bản chấm điểm dựa trên DẤU HIỆU NGÔN NGỮ
// (giống các phần kiểm tra khác trong app), KHÔNG PHẢI tra cứu sự thật
// thật sự — app không có khả năng tự xác minh một claim đúng hay sai.
// Để "xác nhận thông tin có đúng không" một cách đáng tin cậy, cần nối
// vào: (1) một model AI có khả năng tìm kiếm web thời gian thực (Claude/
// GPT có bật web search) để đối chiếu tin tức mới nhất, hoặc (2) API của
// các tổ chức kiểm chứng tin tức (Full Fact, Google Fact Check Tools).
// Bản demo này giúp người dùng NHẬN RA DẤU HIỆU của tin giả để tự cảnh
// giác, và luôn khuyến khích tự kiểm chứng qua nguồn chính thống.
function evaluateFactCheck(raw, celebName) {
  const text = raw.trim();
  const lower = text.toLowerCase();
  const groups = TRUVEXA_KB.factCheckKeywordGroups;

  let score = 8;
  const signals = [];
  groups.forEach((g) => {
    const hit = g.words.some((w) => lower.includes(w));
    if (hit) {
      score += g.weight;
      signals.push(g.label);
    }
  });

  if (celebName && celebName.trim()) {
    score += 6;
    signals.push(`Nội dung gắn với tên "${celebName.trim()}" — cần đối chiếu với trang/kênh chính chủ trước khi tin.`);
  }

  score = Math.max(3, Math.min(97, score));
  return { score, signals };
}

// ---------- Thám Tử Truy Vết ----------
// Gộp các manh mối rời rạc (số điện thoại, đường link, câu chuyện/tin
// nhắn) thành MỘT hồ sơ điều tra duy nhất, thay vì phải kiểm tra riêng
// lẻ từng thứ. Kết hợp chấm điểm cục bộ (offline, tức thì) với một bản
// tổng hợp/kết luận từ AI thật (nếu đã cắm khoá Gemini) để đưa ra nhận
// định toàn diện hơn, giống cách một thám tử ghép các manh mối lại.
function buildDetectiveCase({ phone, link, story }) {
  const clues = [];
  let total = 0;
  let weightSum = 0;

  if (phone && phone.trim()) {
    const flagged = TRUVEXA_KB.flaggedPhones.some((n) => phone.replace(/\s/g, "").includes(n.slice(-8)));
    clues.push({
      key: "phone",
      icon: "phone",
      title: "Số điện thoại",
      value: phone.trim(),
      verdict: flagged ? "Đã bị báo cáo lừa đảo" : "Chưa có báo cáo xấu",
      risky: flagged,
      score: flagged ? 85 : 12,
    });
    total += (flagged ? 85 : 12) * 1;
    weightSum += 1;
  }

  if (link && link.trim()) {
    const { risk, hits, isHttps } = simulateLinkCheck(link.trim());
    clues.push({
      key: "link",
      icon: "link",
      title: "Đường link",
      value: link.trim(),
      verdict: risk >= 55 ? "Có dấu hiệu nguy hiểm" : "Có vẻ an toàn",
      risky: risk >= 55,
      score: risk,
      detail: !isHttps ? "Không dùng kết nối bảo mật HTTPS" : hits.length ? "Chứa mẫu link thường gặp ở lừa đảo" : null,
    });
    total += risk * 1;
    weightSum += 1;
  }

  if (story && story.trim()) {
    const { score, signals } = scoreMessage(story.trim());
    clues.push({
      key: "story",
      icon: "story",
      title: "Câu chuyện / tin nhắn",
      value: story.trim(),
      verdict: score >= 55 ? "Nhiều dấu hiệu lừa đảo" : score >= 30 ? "Cần thận trọng" : "Ít dấu hiệu bất thường",
      risky: score >= 55,
      score,
      signals,
    });
    total += score * 1.2;
    weightSum += 1.2;
  }

  const overallScore = weightSum > 0 ? Math.round(Math.max(3, Math.min(97, total / weightSum))) : 0;
  return { clues, overallScore };
}

// Phân tích văn bản kịch bản/hội thoại theo các nhóm thủ đoạn thao túng ở
// trên — đây là bản chấm điểm dựa trên DẤU HIỆU NGÔN NGỮ cục bộ (không
// tốn API, chạy được offline). Phần phân tích sâu hơn, hiểu ngữ cảnh thật
// sự cần AI thật (xem phần gọi callGeminiText bên dưới, trong ManipResultScreen).
function analyzeManipulation(raw) {
  const text = (raw || "").trim();
  const lower = text.toLowerCase();

  let score = 5;
  const tactics = [];
  MANIPULATION_TACTIC_GROUPS.forEach((g) => {
    const hit = g.words.some((w) => lower.includes(w));
    if (hit) {
      score += g.weight;
      tactics.push(g);
    }
  });

  score = Math.max(3, Math.min(97, score));
  return { score, tactics };
}

const ROMANCE_TACTIC_GROUPS = [

    label: "Tự nhận danh tính đặc biệt, đang ở nước ngoài — khó xác minh",
    words: ["sĩ quan quân đội mỹ", "bác sĩ đang công tác", "kỹ sư giàn khoan", "đang làm nhiệm vụ ở nước ngoài", "goá vợ", "goá chồng", "đang ở chiến trường", "làm việc trên tàu"],
  },

  },

    key: "giftCustoms",
    weight: 24,
    label: "Gửi quà/tiền từ nước ngoài rồi yêu cầu đóng phí hải quan, thuế",
    words: ["hải quan đang giữ", "phí hải quan", "đóng thuế để nhận quà", "công ty vận chuyển yêu cầu", "phí thông quan", "giữ kiện hàng của em"],

    words: ["anh bị tai nạn cần tiền", "cần tiền phẫu thuật gấp", "kẹt tiền bên này", "mượn tạm ít tiền", "cần tiền chuộc", "công ty giữ lương anh"],

    weight: 20,
    label: "Yêu cầu mua thẻ quà tặng / chuyển tiền qua kênh khó truy vết",
    words: ["mua thẻ itunes", "mua thẻ google play", "chuyển qua ví điện tử lạ", "gửi mã thẻ cào", "chuyển bằng tiền điện tử"],
  },

    key: "isolationRomance",
    weight: 14,
    label: "Yêu cầu giữ bí mật mối quan hệ, không cho người thân biết",
    words: ["đừng nói với gia đình em", "giữ bí mật tình yêu của mình", "chuyện này chỉ hai ta biết", "người nhà sẽ không hiểu đâu"],
  },
];

function analyzeRomanceScam(raw) {
  const text = (raw || "").trim();
  const lower = text.toLowerCase();
  let score = 4;
  const tactics = [];
  ROMANCE_TACTIC_GROUPS.forEach((g) => {
    const hit = g.words.some((w) => lower.includes(w));
    if (hit) {
      score += g.weight;
      tactics.push(g);
    }
  });
  score = Math.max(3, Math.min(97, score));
  return { score, tactics };
}

function generateDemoReply(message, tone) {
  const lower = message.toLowerCase();
  let intent = "general";
  if (/giá|bao nhiêu|phí|tiền/.test(lower)) intent = "price";
  else if (/giao hàng|ship|khi nào nhận|đơn hàng/.test(lower)) intent = "shipping";
  else if (/bảo hành|lỗi|hỏng|đổi trả/.test(lower)) intent = "support";
  else if (/còn hàng|còn không|size|màu/.test(lower)) intent = "stock";

  const openers = {
    friendly: "Dạ chào anh/chị 😊",
    professional: "Kính chào Quý khách,",
    concise: "Chào bạn,",
  };
  const closers = {
    friendly: "Có gì thêm anh/chị cứ nhắn cho em nhé, em hỗ trợ ngay ạ!",
    professional: "Rất mong tiếp tục được phục vụ Quý khách. Trân trọng.",
    concise: "Cần gì thêm bạn nhắn mình nhé.",
  };
  const bodies = {
    price: "Dạ về giá sản phẩm, em xin gửi thông tin chi tiết trong ít phút để anh/chị tham khảo ạ.",
    shipping: "Dạ đơn hàng của mình đang được xử lý, thời gian giao dự kiến từ 2-4 ngày tuỳ khu vực ạ.",
    support: "Dạ em rất tiếc vì sự bất tiện này. Anh/chị vui lòng gửi thêm hình ảnh/mô tả để em hỗ trợ đổi trả/bảo hành nhanh nhất ạ.",
    stock: "Dạ để em kiểm tra tồn kho hiện tại và phản hồi lại anh/chị trong ít phút ạ.",
    general: "Cảm ơn anh/chị đã nhắn tin, em đã ghi nhận thông tin và sẽ phản hồi sớm nhất có thể ạ.",
  };

  return `${openers[tone]} ${bodies[intent]} ${closers[tone]}`;

// ---------- Result ----------
// ---------- Kiểm tra mã QR ----------
// Dùng thư viện jsqr (npm install jsqr) để giải mã ảnh QR ngay trên trình
// duyệt — không cần gửi ảnh lên server. Sau khi giải mã ra nội dung, nếu
// là link thì tái sử dụng logic kiểm tra link (simulateLinkCheck) có sẵn.
function isLikelyUrl(text) {
  return /^https?:\/\//i.test(text.trim()) || /^www\./i.test(text.trim());
}

function QRCheckScreen({ onDone }) {
  const [scanning, setScanning] = useState(false);
  const [error, setError] = useState("");
  const videoRef = useRef(null);
  const canvasRef = useRef(null);
  const streamRef = useRef(null);
  const fileRef = useRef(null);
  const rafRef = useRef(null);

  const stopCamera = () => {
    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    if (streamRef.current) streamRef.current.getTracks().forEach((t) => t.stop());
    setScanning(false);
  };

  const startCamera = async () => {
    setError("");
    try {
      const jsQR = (await import("jsqr")).default;
      const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
      streamRef.current = stream;
      videoRef.current.srcObject = stream;
      await videoRef.current.play();
      setScanning(true);

      const tick = () => {
        if (!videoRef.current || videoRef.current.readyState !== 4) {
          rafRef.current = requestAnimationFrame(tick);
          return;
        }
        const canvas = canvasRef.current;
        canvas.width = videoRef.current.videoWidth;
        canvas.height = videoRef.current.videoHeight;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(videoRef.current, 0, 0, canvas.width, canvas.height);
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const code = jsQR(imageData.data, imageData.width, imageData.height);
        if (code) {
          stopCamera();
          onDone(code.data);
          return;
        }
        rafRef.current = requestAnimationFrame(tick);
      };
      tick();
    } catch (e) {
      setError("Không mở được camera — hãy thử tải ảnh chứa mã QR thay thế.");
      setScanning(false);
    }
  };

  const handleFile = async (file) => {
    if (!file) return;
    setError("");
    try {
      const jsQR = (await import("jsqr")).default;
      const img = new Image();
      const reader = new FileReader();
      reader.onload = (e) => {
        img.onload = () => {
          const canvas = canvasRef.current;
          canvas.width = img.width;
          canvas.height = img.height;
          const ctx = canvas.getContext("2d");
          ctx.drawImage(img, 0, 0);
          const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
          const code = jsQR(imageData.data, imageData.width, imageData.height);
          if (code) onDone(code.data);
          else setError("Không tìm thấy mã QR trong ảnh này, thử ảnh khác rõ hơn.");
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    } catch (e) {
      setError("Không đọc được ảnh, thử lại.");
    }
  };

  return (
    <div style={{ padding: "18px 16px 8px" }}>
      <canvas ref={canvasRef} style={{ display: "none" }} />
      <input ref={fileRef} type="file" accept="image/*" style={{ display: "none" }} onChange={(e) => handleFile(e.target.files?.[0])} />

      <div style={{ background: "#111C3E", borderRadius: 16, aspectRatio: "1/1", display: "flex", alignItems: "center", justifyContent: "center", overflow: "hidden", position: "relative", marginBottom: 16 }}>
        <video ref={videoRef} playsInline muted style={{ width: "100%", height: "100%", objectFit: "cover", display: scanning ? "block" : "none" }} />
        {!scanning && (
          <div style={{ textAlign: "center", color: "#7C88AA" }}>
            <QrCode size={40} style={{ opacity: 0.6, marginBottom: 8 }} />
            <div style={{ fontFamily: "'Be Vietnam Pro', sans-serif", fontSize: 12.5 }}>Chưa bật camera</div>
          </div>
        )}
        {scanning && (
          <div style={{ position: "absolute", inset: 24, border: "2.5px solid #2E5BFF", borderRadius: 16, boxShadow: "0 0 0 2000px rgba(0,0,0,0.35)" }} />
        )}
      </div>

      {error && (
        <div style={{ background: C.warnBg, color: "#7A5410", borderRadius: 10, padding: "10px 12px", fontFamily: "'Be Vietnam Pro', sans-serif", fontSize: 12, marginBottom: 12 }}>
          {error}
        </div>
      )}

      <button
        onClick={scanning ? stopCamera : startCamera}
        style={{ width: "100%", display: "flex", alignItems: "center", justifyContent: "center", gap: 8, background: scanning ? C.danger : "#2E5BFF", color: "#fff", border: "none", borderRadius: 10, padding: "13px 0", fontFamily: "'Be Vietnam Pro', sans-serif", fontWeight: 700, fontSize: 14, cursor: "pointer", marginBottom: 10 }}
      >
        <Camera size={16} /> {scanning ? "Dừng Quét" : "Quét Bằng Camera"}
      </button>
      <button
        onClick={() => fileRef.current?.click()}
        style={{ width: "100%", display: "flex", alignItems: "center", justifyContent: "center", gap: 8, background: "#EDF0FA", color: C.navyDeep, border: "none", borderRadius: 10, padding: "13px 0", fontFamily: "'Be Vietnam Pro', sans-serif", fontWeight: 700, fontSize: 14, cursor: "pointer" }}
      >
        <ImagePlus size={16} /> Tải Ảnh Chứa Mã QR
      </button>
    </div>
  );
}

// ---------- Kiểm Tra Wi-Fi Độc Hại ----------
// GHI CHÚ QUAN TRỌNG: trình duyệt web KHÔNG có quyền truy cập sâu vào phần
// cứng Wi-Fi (không đọc được kiểu mã hoá, không phát hiện ARP-spoofing/DNS
// giả mạo, không quét được danh sách thiết bị trong mạng...) — đó là giới
// hạn bảo mật cố ý của mọi trình duyệt, không phải thiếu sót của app. Bản
// kiểm tra này dùng cách tiếp cận thực tế nhất có thể từ web: hỏi người
// dùng vài dấu hiệu họ tự quan sát được (thường là cách chuyên gia an ninh
// mạng cũng dùng để đánh giá nhanh một mạng Wi-Fi lạ), rồi chấm điểm rủi ro.
// Muốn kiểm tra sâu hơn (địa chỉ MAC router, kiểu mã hoá thật...) cần một
// ứng dụng gốc (native app) có quyền truy cập phần cứng mạng.
function WiFiCheckScreen({ onDone }) {
  const [answers, setAnswers] = useState({
    ssid: "",
    open: null, // true = không cần mật khẩu
    genericName: null, // true = tên kiểu "Free_WiFi", "Airport_Wifi"...
    captivePortal: null, // true = có trang đăng nhập lạ hiện lên
    askedPersonalInfo: null, // true = trang đăng nhập đòi số điện thoại/CCCD/OTP
    httpsWarning: null, // true = trình duyệt có cảnh báo "Không an toàn" trên nhiều trang
  });

  const netInfo = (typeof navigator !== "undefined" && navigator.connection) || null;

  const Question = ({ qKey, label }) => (
    <div style={{ marginBottom: 14 }}>
      <div style={{ fontFamily: "'Be Vietnam Pro', sans-serif", fontWeight: 600, fontSize: 13, color: C.navyDeep, marginBottom: 8 }}>{label}</div>
      <div style={{ display: "flex", gap: 8 }}>
        {[
          { v: true, label: "Có" },
          { v: false, label: "Không" },
        ].map((opt) => (
          <button
            key={String(opt.v)}
            onClick={() => setAnswers((a) => ({ ...a, [qKey]: opt.v }))}
            style={{
              flex: 1,
              padding: "9px 0",
              borderRadius: 9,
              border: answers[qKey] === opt.v ? "1.5px solid #2E5BFF" : "1.5px solid #E3E7F3",
              background: answers[qKey] === opt.v ? "#EAF0FF" : "#fff",
              color: answers[qKey] === opt.v ? "#2E5BFF" : C.textMuted,
              fontFamily: "'Be Vietnam Pro', sans-serif",
              fontWeight: 700,
              fontSize: 13,
              cursor: "pointer",
            }}
          >
            {opt.label}
          </button>
        ))}
      </div>
    </div>
  );

  const allAnswered = answers.open !== null && answers.genericName !== null && answers.captivePortal !== null && answers.askedPersonalInfo !== null && answers.httpsWarning !== null;

  return (
    <div style={{ padding: "16px 16px 8px" }}>
      <div style={{ background: C.warnBg, borderRadius: 12, padding: "12px 13px", marginBottom: 16, display: "flex", gap: 8 }}>
        <AlertTriangle size={15} color="#B9760A" style={{ flexShrink: 0, marginTop: 1 }} />
        <div style={{ fontFamily: "'Be Vietnam Pro', sans-serif", fontSize: 11.5, color: "#7A5410", lineHeight: 1.5 }}>
          Trình duyệt không thể tự động quét sâu Wi-Fi. Trả lời vài câu hỏi dưới đây theo những gì bạn quan sát được, Truvexa AI sẽ đánh giá mức độ rủi ro giúp bạn.
        </div>

function evaluateWifiRisk(a) {
  let risk = 5;
  const signals = [];
  if (a.open) {
    risk += 25;
    signals.push("Mạng không có mật khẩu — bất kỳ ai cũng vào được, dữ liệu dễ bị nghe lén.");
  }
  if (a.genericName) {
    risk += 15;
    signals.push("Tên mạng chung chung — kẻ xấu hay đặt tên như vậy để dụ nạn nhân kết nối.");
  }
  if (a.captivePortal) {
    risk += 15;
    signals.push("Có trang đăng nhập lạ hiện ra ngay sau khi kết nối.");
  }
  if (a.askedPersonalInfo) {
    risk += 30;
    signals.push("Trang đăng nhập đòi thông tin cá nhân/OTP — dấu hiệu lừa đảo rõ rệt.");
  }
  if (a.httpsWarning) {
    risk += 20;
    signals.push("Trình duyệt cảnh báo không an toàn trên nhiều trang — có thể mạng đang bị can thiệp (man-in-the-middle).");
  }
  risk = Math.max(3, Math.min(97, risk));
  return { risk, signals };
}

function WiFiResultScreen({ answers, onFinish, historyId, onFeedback }) {
  const { risk, signals } = evaluateWifiRisk(answers || {});
  const risky = risk >= 50;
  const uncertain = !risky && risk >= 25;
  const bg = risky ? C.dangerBg : risk >= 25 ? C.warnBg : C.safeBg;
  const fg = risky ? C.danger : risk >= 25 ? "#B9760A" : C.safe;

  return (
    <div style={{ padding: "16px 16px 8px" }}>
      <div className="holo-card-enter holo-scan-wrap" style={holoCardStyle(holoTone(risky, uncertain))}>
        <div style={{ display: "flex", alignItems: "center", gap: 8, fontFamily: "'Be Vietnam Pro', sans-serif", fontWeight: 800, fontSize: 13.5, color: fg }}>
          <Wifi size={16} />
          {risky ? "MẠNG WI-FI CÓ DẤU HIỆU NGUY HIỂM" : risk >= 25 ? "MẠNG WI-FI CẦN THẬN TRỌNG" : "MẠNG WI-FI TƯƠNG ĐỐI AN TOÀN"}
        </div>
        {answers?.ssid && (
          <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 12, color: C.navyDeep, marginTop: 10, background: "#fff", padding: "8px 10px", borderRadius: 8 }}>
            {answers.ssid}
          </div>
        )}
        <div style={{ fontFamily: "'Be Vietnam Pro', sans-serif", fontSize: 12.5, color: "#5C6690", marginTop: 12 }}>
          Điểm rủi ro: <b style={{ color: fg }}>{risk}%</b>
        </div>
        {signals.length > 0 ? (
          <ul style={{ margin: "10px 0 0", paddingLeft: 18, fontFamily: "'Be Vietnam Pro', sans-serif", fontSize: 12, color: "#5C6690" }}>
            {signals.map((s, i) => (
              <li key={i} style={{ marginBottom: 4 }}>{s}</li>
            ))}
          </ul>
        ) : (
          <div style={{ fontFamily: "'Be Vietnam Pro', sans-serif", fontSize: 12, color: "#2C6B4F", marginTop: 10 }}>
            Không phát hiện dấu hiệu bất thường rõ rệt dựa trên câu trả lời của bạn.
          </div>
        )}
      </div>

      <div style={{ background: C.warnBg, borderRadius: 14, padding: "13px 15px", display: "flex", gap: 8, marginBottom: 16 }}>
        <ShieldAlert size={15} color="#B9760A" style={{ flexShrink: 0, marginTop: 1 }} />
        <div style={{ fontFamily: "'Be Vietnam Pro', sans-serif", fontSize: 12, color: "#7A5410", lineHeight: 1.6 }}>
          <b>Nguyên tắc an toàn khi dùng Wi-Fi công cộng/lạ:</b>
          <br />• Không đăng nhập ngân hàng, ví điện tử khi dùng Wi-Fi lạ.
          <br />• Không nhập mã OTP trên bất kỳ trang nào hiện lên sau khi kết nối Wi-Fi.
          <br />• Nên dùng 4G/5G thay vì Wi-Fi lạ cho giao dịch quan trọng, hoặc bật VPN đáng tin cậy.
          <br />• Tắt tính năng tự động kết nối Wi-Fi đã lưu để tránh bị dụ vào mạng giả mạo trùng tên.
        </div>
      </div>

      <FeedbackWidget historyId={historyId} type="wifi" title="Kiểm Tra Wi-Fi Độc Hại" content={JSON.stringify(answers || {})} onFeedback={onFeedback} />

      <button onClick={onFinish} style={{ width: "100%", background: "#2E5BFF", color: "#fff", border: "none", borderRadius: 10, padding: "13px 0", fontFamily: "'Be Vietnam Pro', sans-serif", fontWeight: 700, fontSize: 14, cursor: "pointer" }}>
        Xong
      </button>
    </div>
  );
}

function simulateDiagnosis(file) {
  let seed = 0;
  const name = (file && file.name) || "demo";
  for (let i = 0; i < name.length; i++) seed += name.charCodeAt(i);
  seed += file && file.size ? Math.round(file.size / 1024) % 53 : 0;
  return PLANT_DISEASE_LIBRARY[seed % PLANT_DISEASE_LIBRARY.length];
}

function DiagnosisResultScreen({ file, onFinish, historyId, onFeedback }) {
  const result = file ? simulateDiagnosis(file) : simulateDiagnosis({ name: "demo" });

  const [aiText, setAiText] = useState(null);
  const [aiLoading, setAiLoading] = useState(false);
  const [aiError, setAiError] = useState(null);

  useEffect(() => {
    if (!getGeminiKey() || !file) return;
    setAiLoading(true);
    fileToBase64(file)
      .then((base64) => {
        const prompt =
          "Bạn là chuyên gia nông nghiệp. Hãy nhìn kỹ tấm ảnh này và cho biết: (1) đây là loại cây/đối tượng gì, " +
          "(2) có dấu hiệu bệnh/sâu hại gì không, nêu tên cụ thể nếu nhận ra, (3) mức độ nghiêm trọng, " +
          "(4) cách xử lý cụ thể. Trả lời bằng tiếng Việt, ngắn gọn, tối đa 6 câu, đi thẳng vào nội dung.";
        return callGeminiVision(prompt, base64, file.type || "image/jpeg");
      })
      .then((r) => {
        setAiLoading(false);
        if (r.ok) setAiText(r.text);
        else setAiError(r.error);
      });
  }, []);

  return (
    <div style={{ padding: "16px 16px 8px" }}>
      {getGeminiKey() && file ? (
        <div style={{ background: "#F3EEFF", border: "1.5px solid #E3D6FF", borderRadius: 14, padding: "16px 16px 14px", marginBottom: 14 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8, fontFamily: "'Be Vietnam Pro', sans-serif", fontWeight: 800, fontSize: 13.5, color: "#7C3AED" }}>
            <Sparkles size={16} /> PHÂN TÍCH TỪ AI THẬT (dựa trên ảnh bạn chụp)

            <div style={{ fontFamily: "'Be Vietnam Pro', sans-serif", fontSize: 12.5, color: C.textMuted, marginTop: 10 }}>
              Đang phân tích ảnh…
            </div>
          )}
          {aiError && (
            <div style={{ fontFamily: "'Be Vietnam Pro', sans-serif", fontSize: 12.5, color: C.danger, marginTop: 10 }}>
              Không gọi được AI: {aiError}. Đang hiện kết quả tham khảo bên dưới thay thế.

          )}

            <>
              <div style={{ fontFamily: "'Be Vietnam Pro', sans-serif", fontSize: 12.5, color: C.navyDeep, marginTop: 10, lineHeight: 1.6, whiteSpace: "pre-wrap" }}>
                {aiText}
              </div>

      <div style={{ background: C.safeBg, borderRadius: 14, padding: "16px 16px 14px", marginBottom: 14 }}>

        </div>
        <div style={{ fontFamily: "'Be Vietnam Pro', sans-serif", fontSize: 12.5, color: C.navyDeep, marginTop: 12 }}>

// ---------- Kết Nối AI Thật (Google Gemini API) ----------
// GHI CHÚ QUAN TRỌNG VỀ BẢO MẬT: khoá API được lưu trong localStorage
// của TRÌNH DUYỆT trên máy bạn — chỉ phù hợp để BẠN TỰ THỬ NGHIỆM một
// mình. Bất kỳ ai mở "View Page Source"/DevTools trên máy đang đăng nhập
// đều có thể đọc được khoá này. TUYỆT ĐỐI không chia sẻ file có khoá đã
// nhập, không dùng khoá này khi app có nhiều người dùng công khai. Khi
// nào app có nhiều người dùng thật, cần chuyển khoá API sang lưu trong
// Firebase Cloud Functions (chạy phía máy chủ, người dùng không thấy
// được khoá) — đây là bước nâng cấp riêng cho tương lai.
//
// Vì sao chọn Gemini: Google cấp phiên bản MIỄN PHÍ dùng lâu dài (không
// chỉ dùng thử vài ngày như nhiều API khác), và cho phép gọi thẳng từ
// trình duyệt (không bị chặn CORS như OpenAI/Anthropic thường yêu cầu
// qua server riêng). Lấy khoá miễn phí tại: https://aistudio.google.com/app/apikey
const GEMINI_KEY_STORAGE = "truvexa_gemini_api_key";

function getGeminiKey() {
  try {
    return localStorage.getItem(GEMINI_KEY_STORAGE) || "";
  } catch (e) {
    return "";
  }
}

function saveGeminiKey(key) {
  try {
    if (key) localStorage.setItem(GEMINI_KEY_STORAGE, key);
    else localStorage.removeItem(GEMINI_KEY_STORAGE);
    return true;
  } catch (e) {
    return false;
  }
}

// Gọi thẳng tới Gemini — tự nhận diện đúng cách xác thực theo loại khoá:
// - Khoá mới "AQ...." (Auth key, Google chuyển sang dùng từ giữa năm 2026)
//   cần gửi qua header "Authorization: Bearer".
// - Khoá cũ "AIzaSy..." (Standard key) gửi qua tham số ?key= trên URL.
// Nếu đoán sai loại khoá lúc đầu, tự động thử lại theo cách còn lại trước
// khi báo lỗi, để không phụ thuộc quá chặt vào một định dạng khoá cụ thể.
async function geminiFetch(body) {
  const key = getGeminiKey();
  if (!key) return { ok: false, error: "no_key" };
  const url = "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent";
  const isAuthKey = key.startsWith("AQ.") || key.startsWith("AQ");

  const attempt = async (useBearer) => {
    const res = await fetch(useBearer ? url : `${url}?key=${key}`, {
      method: "POST",
      headers: useBearer ? { "Content-Type": "application/json", Authorization: `Bearer ${key}` } : { "Content-Type": "application/json" },
      body: JSON.stringify(body),
    });
    const data = await res.json();
    return { httpOk: res.ok, data };
  };

  try {
    let { httpOk, data } = await attempt(isAuthKey);
    if (!httpOk) {
      // Thử lại theo cách còn lại trước khi báo lỗi hẳn
      const retry = await attempt(!isAuthKey);
      httpOk = retry.httpOk;
      data = retry.data;
    }
    if (!httpOk) return { ok: false, error: data?.error?.message || "Lỗi API không rõ" };
    const text = data?.candidates?.[0]?.content?.parts?.[0]?.text || "";
    return { ok: true, text };
  } catch (e) {
    return { ok: false, error: e.message || "Lỗi kết nối mạng" };
  }
}

// Gọi Gemini bằng văn bản — dùng cho Truy Vết Tin Giả, phân tích tin
// nhắn... Trả về { ok, text } hoặc { ok:false, error }.
async function callGeminiText(prompt) {
  return geminiFetch({ contents: [{ parts: [{ text: prompt }] }] });
}

// Gọi Gemini kèm ảnh (multimodal) — dùng cho Nhận Diện & Chẩn Đoán ảnh
// thật. `base64Data` không kèm tiền tố "data:image/...;base64,".
async function callGeminiVision(prompt, base64Data, mimeType) {
  return geminiFetch({
    contents: [
      {
        parts: [{ text: prompt }, { inline_data: { mime_type: mimeType || "image/jpeg", data: base64Data } }],
      },
    ],
  });
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(String(reader.result).split(",")[1] || "");
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

  },
];

function getProviderKey(providerId) {
  try {
    return localStorage.getItem(`truvexa_api_key_${providerId}`) || "";
  } catch (e) {
    return "";
  }
}

function saveProviderKey(providerId, key) {
  try {
    if (key) localStorage.setItem(`truvexa_api_key_${providerId}`, key);
    else localStorage.removeItem(`truvexa_api_key_${providerId}`);
    // Gemini vẫn cần đồng bộ với hàm cũ getGeminiKey()/saveGeminiKey() —
    // 2 tính năng Truy Vết Tin Giả & Chẩn Đoán ảnh đang dùng hàm đó.
    if (providerId === "gemini") saveGeminiKey(key);
    return true;
  } catch (e) {
    return false;
  }
}

function ApiKeyCard() {
  const [providerId, setProviderId] = useState("gemini");
  const provider = AI_KEY_PROVIDERS.find((p) => p.id === providerId);
  const [key, setKey] = useState(getProviderKey(providerId));
  const [showKey, setShowKey] = useState(false);
  const [saved, setSaved] = useState(false);
  const [testing, setTesting] = useState(false);
  const [testResult, setTestResult] = useState(null); // "ok" | "fail" | "unsupported" | null
  const [testError, setTestError] = useState("");

  const switchProvider = (id) => {
    setProviderId(id);
    setKey(getProviderKey(id));
    setTestResult(null);
    setTestError("");
  };

  const save = () => {
    saveProviderKey(providerId, key.trim());
    setSaved(true);
    setTestResult(null);
    setTimeout(() => setSaved(false), 1500);
  };

  const remove = () => {
    setKey("");
    saveProviderKey(providerId, "");
    setTestResult(null);
  };

  const testKey = async () => {
    saveProviderKey(providerId, key.trim());
    if (!provider.workable) {
      setTestResult("unsupported");
      return;
    }
    setTesting(true);
    setTestResult(null);
    setTestError("");
    const r = await callGeminiText("Trả lời đúng 2 từ: Kết nối thành công");
    setTestResult(r.ok ? "ok" : "fail");
    if (!r.ok) setTestError(r.error || "");
    setTesting(false);
  };

  return (
    <div style={{ background: "#fff", borderRadius: 12, padding: "13px 14px", marginBottom: 18 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 12 }}>
        <span style={{ width: 34, height: 34, borderRadius: 9, background: key ? "#E6F7EE" : "#EDF0FA", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
          <Sparkles size={16} color={key ? C.safe : C.textMuted} />
        </span>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ fontFamily: "'Be Vietnam Pro', sans-serif", fontWeight: 700, fontSize: 13, color: C.navyDeep }}>Kết Nối AI Thật</div>
          <div style={{ fontFamily: "'Be Vietnam Pro', sans-serif", fontSize: 11, color: C.textMuted, marginTop: 2 }}>
            {key ? `Đã lưu khoá cho ${provider.name}` : `Chưa có khoá cho ${provider.name}`}
          </div>
        </div>
      </div>

      <select
        value={providerId}
        onChange={(e) => switchProvider(e.target.value)}
        style={{ width: "100%", padding: "10px 12px", borderRadius: 9, border: "1.5px solid #E3E7F3", fontFamily: "'Be Vietnam Pro', sans-serif", fontSize: 13, fontWeight: 600, color: C.navyDeep, marginBottom: 10, boxSizing: "border-box" }}
      >
        {AI_KEY_PROVIDERS.map((p) => (
          <option key={p.id} value={p.id}>
            {p.name}{!p.workable ? " (chưa gọi trực tiếp được)" : ""}
          </option>
        ))}
      </select>

      <div style={{ fontFamily: "'Be Vietnam Pro', sans-serif", fontSize: 11, color: C.textMuted, lineHeight: 1.6, marginBottom: 10, background: "#F4F6FB", padding: "9px 11px", borderRadius: 8 }}>
        {provider.workable ? (
          <>⚠️ Chỉ dùng cho <b>một mình bạn thử nghiệm</b>. Khoá lưu trong máy này (localStorage), đừng chia sẻ file cho ai.</>
        ) : (
          <>
            ⚠️ <b>{provider.name}</b> thường chặn gọi trực tiếp từ trình duyệt (giới hạn CORS của nhà cung cấp) — khoá vẫn được lưu lại, nhưng cần có máy chủ trung gian riêng mới gọi được. Hiện chỉ <b>Google Gemini</b> gọi thẳng được từ app này.
          </>
        )}
      </div>

      <div style={{ position: "relative", marginBottom: 10 }}>
        <input
          type={showKey ? "text" : "password"}
          value={key}
          onChange={(e) => setKey(e.target.value)}
          placeholder={`Dán khoá API ${provider.name} vào đây (${provider.placeholder})`}
          style={{ width: "100%", padding: "10px 40px 10px 12px", borderRadius: 9, border: "1.5px solid #E3E7F3", fontFamily: "'JetBrains Mono', monospace", fontSize: 12, boxSizing: "border-box" }}
        />
        <button
          onClick={() => setShowKey((s) => !s)}
          style={{ position: "absolute", right: 8, top: "50%", transform: "translateY(-50%)", background: "none", border: "none", cursor: "pointer", color: "#2E5BFF", fontFamily: "'Be Vietnam Pro', sans-serif", fontWeight: 700, fontSize: 11 }}
        >
          {showKey ? "Ẩn" : "Hiện"}
        </button>
      </div>

      <div style={{ display: "flex", gap: 8, marginBottom: 10 }}>
        <button onClick={save} style={{ flex: 1, padding: "9px 0", borderRadius: 9, border: "none", background: "#2E5BFF", color: "#fff", fontFamily: "'Be Vietnam Pro', sans-serif", fontWeight: 700, fontSize: 12.5, cursor: "pointer" }}>
          {saved ? "Đã Lưu!" : "Lưu Khoá"}
        </button>
        <button
          onClick={testKey}
          disabled={!key || testing}
          style={{ flex: 1, padding: "9px 0", borderRadius: 9, border: "1.5px solid #E3E7F3", background: "#fff", color: !key ? C.textMuted : C.navyDeep, fontFamily: "'Be Vietnam Pro', sans-serif", fontWeight: 700, fontSize: 12.5, cursor: !key || testing ? "not-allowed" : "pointer" }}
        >
          {testing ? "Đang kiểm tra…" : "Kiểm Tra Kết Nối"}
        </button>
        {key && (
          <button onClick={remove} style={{ padding: "9px 12px", borderRadius: 9, border: "1.5px solid #F7D6D6", background: "#FDF1F1", color: C.danger, cursor: "pointer" }}>
            <Trash2 size={14} />
          </button>
        )}
      </div>

      {testResult === "ok" && (
        <div style={{ display: "flex", alignItems: "center", gap: 6, fontFamily: "'Be Vietnam Pro', sans-serif", fontSize: 12, color: C.safe, fontWeight: 600 }}>
          <CheckCircle2 size={14} /> Kết nối thành công! Khoá hoạt động tốt.
        </div>
      )}
      {testResult === "fail" && (
        <div style={{ fontFamily: "'Be Vietnam Pro', sans-serif", fontSize: 12, color: C.danger, fontWeight: 600 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
            <XCircle size={14} /> Kết nối thất bại.
          </div>
          {testError && <div style={{ fontWeight: 400, marginTop: 4, fontFamily: "'JetBrains Mono', monospace", fontSize: 10.5, wordBreak: "break-word" }}>{testError}</div>}
        </div>
      )}
      {testResult === "unsupported" && (
        <div style={{ fontFamily: "'Be Vietnam Pro', sans-serif", fontSize: 12, color: "#B9760A", fontWeight: 600 }}>
          Đã lưu khoá, nhưng {provider.name} chưa gọi trực tiếp được từ app này (xem ghi chú phía trên).
        </div>
      )}

      <a
        href={provider.getKeyUrl}
        target="_blank"
        rel="noreferrer"
        style={{ display: "inline-flex", alignItems: "center", gap: 4, marginTop: 10, fontFamily: "'Be Vietnam Pro', sans-serif", fontSize: 12, color: "#2E5BFF", fontWeight: 600, textDecoration: "none" }}
      >
        <ExternalLink size={12} /> Lấy khoá API {provider.name}
      </a>
    </div>
  );
}

function TrainingDataExportCard() {
  const [log, setLog] = useState([]);
  const [copied, setCopied] = useState(false);

  useEffect(() => {
    setLog(loadFeedbackLog());
  }, []);

  const download = () => {
    const jsonl = buildTrainingJsonl(log);
    try {
      const blob = new Blob([jsonl], { type: "application/x-jsonlines" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `truvexa-du-lieu-huan-luyện-${Date.now()}.jsonl`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    } catch (e) {
      alert("Không thể tải file — thử dùng nút Copy bên cạnh thay thế.");
    }
  };

  const copy = async () => {
    try {
      await navigator.clipboard.writeText(buildTrainingJsonl(log));
      setCopied(true);
      setTimeout(() => setCopied(false), 1500);
    } catch (e) {
      // clipboard có thể bị chặn trong khung xem trước
    }
  };

  return (
    <div style={{ background: "#fff", borderRadius: 12, padding: "13px 14px", marginBottom: 18 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: log.length ? 12 : 0 }}>
        <span style={{ width: 34, height: 34, borderRadius: 9, background: log.length ? "#F3EEFF" : "#EDF0FA", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
          <BookOpen size={16} color={log.length ? "#7C3AED" : C.textMuted} />
        </span>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ fontFamily: "'Be Vietnam Pro', sans-serif", fontWeight: 700, fontSize: 13, color: C.navyDeep }}>Kho Dữ Liệu Huấn Luyện</div>
          <div style={{ fontFamily: "'Be Vietnam Pro', sans-serif", fontSize: 11, color: C.textMuted, marginTop: 2 }}>
            {log.length ? `${log.length} mẫu đã thu thập từ đánh giá người dùng` : "Chưa có dữ liệu — cần người dùng đánh giá kết quả trước (👍👎 sau mỗi lượt kiểm tra)"}
          </div>
        </div>
      </div>
      {log.length > 0 && (
        <div style={{ display: "flex", gap: 8 }}>
          <button
            onClick={download}
            style={{ flex: 1, padding: "9px 0", borderRadius: 9, border: "none", background: "#7C3AED", color: "#fff", fontFamily: "'Be Vietnam Pro', sans-serif", fontWeight: 700, fontSize: 12.5, cursor: "pointer" }}
          >
            Tải Xuống (.jsonl)
          </button>
          <button
            onClick={copy}
            style={{ flex: 1, padding: "9px 0", borderRadius: 9, border: "1.5px solid #E3E7F3", background: "#fff", color: C.navyDeep, fontFamily: "'Be Vietnam Pro', sans-serif", fontWeight: 700, fontSize: 12.5, cursor: "pointer" }}
          >
            {copied ? "Đã Copy!" : "Copy"}
          </button>
        </div>
      )}
    </div>
  );
}

const DAILY_UPDATE_POOL = [
  { title: "Xuất hiện chiêu giả danh nhân viên điện lực yêu cầu thanh toán qua QR code lạ", tag: "Cảnh báo mới", mediaType: "image" },

  { title: "Cuộc gọi video call deepfake giả người thân xin vay tiền gấp", tag: "Nguy hiểm cao", mediaType: "video" },
];

function getDailyUpdates() {
  const day = new Date().getDate();
  const rotated = [...DAILY_UPDATE_POOL.slice(day % DAILY_UPDATE_POOL.length), ...DAILY_UPDATE_POOL.slice(0, day % DAILY_UPDATE_POOL.length)];
  return rotated.slice(0, 3);
}

function formatDateVN(d) {
  return d.toLocaleDateString("vi-VN", { day: "2-digit", month: "2-digit", year: "numeric" });
}

function detectMarketplace(url) {
  if (!url) return null;
  const lower = url.toLowerCase();
  if (lower.includes("shopee")) return { name: "Shopee", color: "#EE4D2D" };
  if (lower.includes("lazada")) return { name: "Lazada", color: "#0F146D" };
  if (lower.includes("tiki")) return { name: "Tiki", color: "#1A94FF" };
  return { name: "Xem Sản Phẩm", color: "#2E5BFF" };
}

function VideoCallScreen({ contact, onEnd }) {
  const [status, setStatus] = useState("connecting"); // connecting | live | ended
  const [micOn, setMicOn] = useState(true);
  const [camOn, setCamOn] = useState(true);
  const videoRef = useRef(null);
  const streamRef = useRef(null);

  useEffect(() => {
    let mounted = true;
    (async () => {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        if (!mounted) return;
        streamRef.current = stream;
        if (videoRef.current) {
          videoRef.current.srcObject = stream;
          await videoRef.current.play();
        }
        setTimeout(() => mounted && setStatus("live"), 1200);
      } catch (e) {
        setStatus("error");
      }
    })();
    return () => {
      mounted = false;
      streamRef.current?.getTracks().forEach((t) => t.stop());
    };
  }, []);

  const toggleMic = () => {
    streamRef.current?.getAudioTracks().forEach((t) => (t.enabled = !micOn));
    setMicOn((v) => !v);
  };
  const toggleCam = () => {
    streamRef.current?.getVideoTracks().forEach((t) => (t.enabled = !camOn));
    setCamOn((v) => !v);
  };
  const hangUp = () => {
    streamRef.current?.getTracks().forEach((t) => t.stop());
    onEnd();
  };

  return (
    <div style={{ background: "#0A1530", height: 440, position: "relative", overflow: "hidden" }}>
      {status === "error" ? (
        <div style={{ display: "flex", alignItems: "center", justifyContent: "center", height: "100%", padding: "0 24px", textAlign: "center", color: "#C4CCE0", fontFamily: "'Be Vietnam Pro', sans-serif", fontSize: 13 }}>
          Không mở được camera/microphone — hãy cấp quyền truy cập hoặc thử trên app đã deploy thật (bị giới hạn trong khung xem trước).
        </div>
      ) : (
        <>
          <video ref={videoRef} playsInline muted style={{ width: "100%", height: "100%", objectFit: "cover", display: camOn ? "block" : "none" }} />
          {!camOn && (
            <div style={{ display: "flex", alignItems: "center", justifyContent: "center", height: "100%", color: "#5E6FA0" }}>
              <VideoOff size={36} />
            </div>
          )}

          <div style={{ position: "absolute", top: 16, left: 0, right: 0, textAlign: "center" }}>
            <div style={{ fontFamily: "'Be Vietnam Pro', sans-serif", fontWeight: 700, fontSize: 15, color: "#fff" }}>{contact?.name}</div>

// lý do gì đó ảnh không tải được (mất mạng, đổi tên file, xoá nhầm...),
// tự động lùi về khiên SVG dự phòng bên dưới để màn đăng nhập không bao

function LoginLogoImage({ size = 160 }) {
  const [failed, setFailed] = useState(false);
  if (failed) return <TruvexaLogo size={size * 0.8} />;
  return (
    <img
      src={LOGIN_LOGO_URL}
      alt="Truvexa AI"
      width={size}
      height={size}
      decoding="async"
      onError={() => setFailed(true)}
      style={{ width: size, height: size, maxWidth: "100%", objectFit: "contain", display: "block", margin: "0 auto" }}
    />
  );
}

// ---------- Tìm kiếm ----------
// Tìm trong Khách hàng (tên/SĐT/ghi chú), Lịch sử kiểm tra, và bài đăng
// Cộng đồng — tìm kiếm cục bộ trên dữ liệu đang có trong app, không cần
// gọi API riêng.
function SearchScreen({ customers, history, posts, onOpenCustomer, onOpenPost }) {
  const [query, setQuery] = useState("");
  const q = query.trim().toLowerCase();

  const matchedCustomers = q ? customers.filter((c) => `${c.name} ${c.phone} ${c.note}`.toLowerCase().includes(q)) : [];
  const matchedHistory = q ? history.filter((h) => h.title.toLowerCase().includes(q)) : [];
  const matchedPosts = q ? posts.filter((p) => `${p.author} ${p.caption}`.toLowerCase().includes(q)) : [];
  const totalResults = matchedCustomers.length + matchedHistory.length + matchedPosts.length;

  return (
    <div style={{ padding: "16px 16px 8px" }}>
      <div style={{ position: "relative", marginBottom: 18 }}>
        <Search size={15} color={C.textMuted} style={{ position: "absolute", left: 13, top: 13 }} />
        <input
          autoFocus
          value={query}
          onChange={(e) => setQuery(e.target.value)}
          placeholder="Tìm khách hàng, lịch sử, bài đăng…"
          style={{ width: "100%", padding: "11px 14px 11px 36px", borderRadius: 10, border: "1.5px solid #E3E7F3", fontFamily: "'Be Vietnam Pro', sans-serif", fontSize: 13.5, boxSizing: "border-box", background: "#fff" }}
        />
      </div>

      {!q && (
        <div style={{ textAlign: "center", padding: "40px 10px", color: C.textMuted, fontFamily: "'Be Vietnam Pro', sans-serif", fontSize: 13 }}>
          <SearchX size={26} style={{ marginBottom: 8, opacity: 0.5 }} />
          <div>Nhập từ khoá để bắt đầu tìm kiếm</div>
        </div>
      )}

      {q && totalResults === 0 && (
        <div style={{ textAlign: "center", padding: "40px 10px", color: C.textMuted, fontFamily: "'Be Vietnam Pro', sans-serif", fontSize: 13 }}>
          Không tìm thấy kết quả nào cho "{query}"
        </div>
      )}

      {matchedCustomers.length > 0 && (
        <>
          <div style={{ fontFamily: "'Be Vietnam Pro', sans-serif", fontWeight: 800, fontSize: 11.5, color: C.textMuted, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 8 }}>
            Khách hàng ({matchedCustomers.length})
          </div>
          {matchedCustomers.map((c) => (
            <button key={c.id} onClick={() => onOpenCustomer()} style={{ width: "100%", display: "flex", alignItems: "center", gap: 10, background: "#fff", border: "none", borderRadius: 10, padding: "10px 12px", marginBottom: 8, cursor: "pointer", textAlign: "left" }}>
              <Users size={14} color="#2E5BFF" />
              <div>
                <div style={{ fontFamily: "'Be Vietnam Pro', sans-serif", fontWeight: 700, fontSize: 12.5, color: C.navyDeep }}>{c.name}</div>
                <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 11, color: C.textMuted }}>{c.phone}</div>
              </div>
            </button>
          ))}
        </>
      )}

      {matchedHistory.length > 0 && (
        <>
          <div style={{ fontFamily: "'Be Vietnam Pro', sans-serif", fontWeight: 800, fontSize: 11.5, color: C.textMuted, textTransform: "uppercase", letterSpacing: 0.5, margin: "14px 0 8px" }}>
            Lịch sử kiểm tra ({matchedHistory.length})
          </div>
          {matchedHistory.map((h, i) => (
            <div key={i} style={{ display: "flex", alignItems: "center", gap: 10, background: "#fff", borderRadius: 10, padding: "10px 12px", marginBottom: 8 }}>
              <h.icon size={14} color={C.navyDeep} />
              <div style={{ fontFamily: "'Be Vietnam Pro', sans-serif", fontWeight: 700, fontSize: 12.5, color: C.navyDeep, flex: 1 }}>{h.title}</div>
              <Badge text={h.badge} tone={h.tone} />
            </div>
          ))}
        </>
      )}

      {matchedPosts.length > 0 && (
        <>
          <div style={{ fontFamily: "'Be Vietnam Pro', sans-serif", fontWeight: 800, fontSize: 11.5, color: C.textMuted, textTransform: "uppercase", letterSpacing: 0.5, margin: "14px 0 8px" }}>
            Cộng đồng ({matchedPosts.length})
          </div>
          {matchedPosts.map((p) => (
            <button key={p.id} onClick={() => onOpenPost(p)} style={{ width: "100%", display: "flex", alignItems: "flex-start", gap: 10, background: "#fff", border: "none", borderRadius: 10, padding: "10px 12px", marginBottom: 8, cursor: "pointer", textAlign: "left" }}>
              <Users2 size={14} color="#0EA5A0" style={{ marginTop: 2, flexShrink: 0 }} />
              <div>
                <div style={{ fontFamily: "'Be Vietnam Pro', sans-serif", fontWeight: 700, fontSize: 12, color: C.navyDeep }}>{p.author}</div>
                <div style={{ fontFamily: "'Be Vietnam Pro', sans-serif", fontSize: 11.5, color: "#5C6690", marginTop: 2, lineHeight: 1.4 }}>{p.caption.slice(0, 80)}{p.caption.length > 80 ? "…" : ""}</div>
              </div>
            </button>
          ))}
        </>
      )}
    </div>
  );
}
