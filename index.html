    <!-- ========== BỘ BẮT LỖI HIỂN THỊ NGAY TRÊN MÀN HÌNH ==========

    <div id="error-overlay" style="display:none; position:fixed; inset:0; z-index:99999; background:#1a0000; color:#ffdddd; font:12px/1.5 monospace; padding:16px; overflow:auto; white-space:pre-wrap; word-break:break-word;"></div>
    <script>
      (function () {
        var overlay = document.getElementById('error-overlay');
        var shown = false;
        function showError(title, detail) {
          shown = true;
          overlay.style.display = 'block';
          var box = document.createElement('div');
          box.style.marginBottom = '14px';
          box.style.borderBottom = '1px solid #552222';
          box.style.paddingBottom = '10px';
          box.innerHTML = '<b style="color:#ff6666">' + title + '</b><br>' + detail;
          overlay.appendChild(box);
          var fb = document.getElementById('loading-fallback');
          if (fb) fb.innerText = 'Đã xảy ra lỗi — xem chi tiết bên dưới ↓';
        }
        window.addEventListener('error', function (e) {
          showError('Lỗi JS: ' + (e.message || 'không rõ'),
            (e.filename ? 'File: ' + e.filename + ':' + e.lineno + ':' + e.colno + '<br>' : '') +
            (e.error && e.error.stack ? String(e.error.stack).replace(/</g, '&lt;') : ''));
        });
        window.addEventListener('unhandledrejection', function (e) {
          var reason = e.reason;
          showError('Lỗi Promise (async)',
            (reason && reason.stack ? String(reason.stack).replace(/</g, '&lt;') : String(reason)));
        });
        setTimeout(function () {
          var fb = document.getElementById('loading-fallback');
          if (fb && fb.isConnected && !shown) {
            showError('Không có lỗi JS nào được bắt, nhưng app chưa render sau 6 giây',

              'Thử: mở file này qua một địa chỉ http(s) thật (VD: GitHub Pages) thay vì bấm mở file trực tiếp.');
          }
        }, 6000);
      })();
    </script>

// ---------- Giọng nói: đọc to (TTS) và nói để nhập (STT) ----------
// Dùng Web Speech API có sẵn trong trình duyệt — miễn phí, không cần API
// key. Hoạt động tốt trên Chrome Android; Safari/iOS hỗ trợ đọc to tốt,
// nhận diện giọng nói có thể hạn chế hơn tuỳ phiên bản iOS.

// ---------- Chia sẻ sang app khác ----------
// Dùng Web Share API có sẵn trong trình duyệt điện thoại — mở đúng bảng
// chia sẻ gốc của máy (Zalo, Messenger, Facebook, SMS...), không cần tích
// hợp riêng từng app. Trên máy tính/trình duyệt không hỗ trợ, tự động copy
// nội dung vào clipboard thay thế.
function ShareButton({ title = "Truvexa AI", text, url, size = 13 }) {
  const [copied, setCopied] = useState(false);

  const share = async () => {
    if (navigator.share) {
      try {
        await navigator.share({ title, text, url });
      } catch (e) {
        // người dùng bấm huỷ hộp thoại chia sẻ — bỏ qua, không phải lỗi
      }
    } else {
      try {
        await navigator.clipboard.writeText(url ? `${text}\n${url}` : text);
        setCopied(true);
        setTimeout(() => setCopied(false), 1500);
      } catch (e) {
        // clipboard có thể bị chặn trong khung xem trước
      }
    }
  };

  return (
    <button
      onClick={share}
      style={{
        display: "inline-flex",
        alignItems: "center",
        gap: 4,
        background: "none",
        border: "1px solid #E3E7F3",
        borderRadius: 999,
        padding: "4px 9px",
        cursor: "pointer",
        color: "#2E5BFF",
        fontFamily: "'Be Vietnam Pro', sans-serif",
        fontSize: 11,
        fontWeight: 600,
      }}
    >
      <Share2 size={size} /> {copied ? "Đã copy!" : "Chia Sẻ"}
    </button>
  );
}

function SpeakButton({ text, lang = "vi-VN", size = 13 }) {
  const [speaking, setSpeaking] = useState(false);

  const toggle = () => {
    if (typeof window === "undefined" || !window.speechSynthesis) return;
    if (speaking) {
      window.speechSynthesis.cancel();
      setSpeaking(false);
      return;
    }
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = lang;
    utter.onend = () => setSpeaking(false);
    utter.onerror = () => setSpeaking(false);
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(utter);
    setSpeaking(true);
  };

  return (
    <button
      onClick={toggle}
      title="Đọc to"
      style={{
        display: "inline-flex",
        alignItems: "center",
        gap: 4,
        background: speaking ? "#E9EEFF" : "none",
        border: "1px solid #E3E7F3",
        borderRadius: 999,
        padding: "4px 9px",
        cursor: "pointer",
        color: "#2E5BFF",
        fontFamily: "'Be Vietnam Pro', sans-serif",
        fontSize: 11,
        fontWeight: 600,
      }}
    >
      {speaking ? <Square size={size - 3} /> : <VolumeIcon size={size} />}
      {speaking ? "Dừng" : "Đọc to"}
    </button>
  );
}

function VoiceInputButton({ onResult, lang = "vi-VN" }) {
  const [listening, setListening] = useState(false);
  const recognitionRef = useRef(null);

  const toggle = () => {
    const SR = typeof window !== "undefined" && (window.SpeechRecognition || window.webkitSpeechRecognition);
    if (!SR) {
      alert("Trình duyệt này chưa hỗ trợ nhận diện giọng nói. Hãy thử bằng Chrome trên Android.");
      return;
    }
    if (listening) {
      recognitionRef.current?.stop();
      setListening(false);
      return;
    }
    const recognition = new SR();
    recognition.lang = lang;
    recognition.interimResults = false;
    recognition.maxAlternatives = 1;
    recognition.onresult = (e) => {
      const transcript = e.results[0][0].transcript;
      onResult(transcript);
    };
    recognition.onend = () => setListening(false);
    recognition.onerror = () => setListening(false);
    recognitionRef.current = recognition;
    recognition.start();
    setListening(true);
  };

  return (
    <button
      onClick={toggle}
      title="Nói để nhập"
      style={{
        display: "inline-flex",
        alignItems: "center",
        gap: 4,
        background: listening ? "#FDECEC" : "#F0F3FC",
        border: "none",
        borderRadius: 999,
        padding: "6px 11px",
        cursor: "pointer",
        color: listening ? "#E5342C" : "#2E5BFF",
        fontFamily: "'Be Vietnam Pro', sans-serif",
        fontSize: 11.5,
        fontWeight: 700,
      }}
    >
      <MicIcon2 size={13} style={{ animation: listening ? "pulse 1s infinite" : "none" }} />
      {listening ? "Đang nghe…" : "Nói để nhập"}
    </button>
  );
}

// ---------- demo heuristics (illustrative, not a trained model) ----------
function simulateMediaScan(file) {
  let seed = 0;
  for (let i = 0; i < file.name.length; i++) seed += file.name.charCodeAt(i);
  seed += Math.round(file.size / 1024) % 89;
  return Math.max(6, Math.min(97, 18 + (seed % 78)));
}
